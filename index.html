<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="גינון רביד">
<meta name="theme-color" content="#3a6b35">
<title>יומן מתן רביד גינון והשקיה</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f5f0e8;color:#2c2c1e;min-height:100vh;}
.btn{cursor:pointer;border:none;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:700;transition:all .15s;display:inline-block;text-decoration:none;}
.bg{background:#3a6b35;color:#fff;}.bg:hover{background:#2e5228;}
.bs{background:#7a9e72;color:#fff;}.bs:hover{background:#5e7e56;}
.bo{background:transparent;color:#3a6b35;border:1.5px solid #3a6b35;}.bo:hover{background:#3a6b35;color:#fff;}
.br{background:#f5e8e0;color:#b5673d;border:1px solid #e0c8b8;}
.bw{background:#25D366;color:#fff;}.bw:hover{background:#1da851;}
.bsm{padding:5px 10px;font-size:12px;}.bxs{padding:3px 7px;font-size:11px;border-radius:4px;}
.card{background:#fffdf7;border:1px solid #d9d0b8;border-radius:12px;box-shadow:0 2px 8px rgba(60,50,20,.07);}
input,textarea,select{font-family:Arial,sans-serif;border:1.5px solid #c9c0a0;border-radius:6px;padding:7px 9px;font-size:13px;background:#fff;color:#2c2c1e;width:100%;outline:none;box-sizing:border-box;}
input:focus,textarea:focus,select:focus{border-color:#3a6b35;}
textarea{resize:vertical;}
.lbl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#7a6e55;margin-bottom:4px;display:block;}
#header{background:linear-gradient(135deg,#2e5228,#3a6b35,#4a8040);padding:14px 18px 0;box-shadow:0 4px 20px rgba(30,50,20,.2);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.logo-t{color:#fff;font-size:16px;font-weight:700;line-height:1.2;}
.logo-s{color:#a8d4a0;font-size:11px;margin-top:2px;}
.tabs{display:flex;gap:3px;flex-wrap:wrap;}
.tab{cursor:pointer;padding:8px 13px;border-radius:8px 8px 0 0;font-weight:700;font-size:13px;border:none;background:transparent;color:#fff;transition:all .15s;}
.tab.on{background:#3a6b35;}.tab:hover:not(.on){background:rgba(255,255,255,.15);}
#main{padding:14px;max-width:900px;margin:0 auto;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.chdr{text-align:center;font-size:10px;font-weight:700;color:#7a6e55;padding:2px 0;}
.dc{cursor:pointer;border-radius:7px;padding:4px 3px;min-height:60px;border:1.5px solid transparent;transition:all .15s;background:#fffdf7;vertical-align:top;}
.dc:hover{background:#e8f0e4;border-color:#a8c89e;}
.dc.tod{border-color:#3a6b35!important;background:#eef6eb;}
.dc.hv{background:#f0f5ee;}
.dc.hh{border-color:#e8b4b4;background:#fdf0f0;}
.dc.hv2{border-color:#b4cce8;background:#eaf4fb;}
.dc.hm{border-color:#c8c8c8;background:#f2f3f4;}
.dc-n{font-size:12px;margin-bottom:1px;}
.dc-h{font-size:8px;font-weight:700;line-height:1.1;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.dc-c{font-size:8px;background:#3a6b35;color:#fff;border-radius:3px;padding:1px 3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.legend{display:flex;gap:10px;margin-bottom:7px;flex-wrap:wrap;font-size:10px;align-items:center;}
.ldot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-left:3px;}
.vc{margin-bottom:12px;padding:13px 15px;}
.vh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;flex-wrap:wrap;gap:6px;}
.fr{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:9px;}
.fb{min-width:120px;flex:1;}
.ir{background:#f8f5ef;border-radius:6px;padding:7px 8px;margin-bottom:5px;border:1px solid #e0d8c0;}
.ig{display:grid;grid-template-columns:88px 1fr 50px 66px 24px;gap:5px;align-items:center;}
.acw{position:relative;}
.sug{position:absolute;top:100%;right:0;left:0;background:#fff;border:1.5px solid #3a6b35;border-top:none;border-radius:0 0 6px 6px;z-index:50;max-height:130px;overflow-y:auto;display:none;}
.sug.show{display:block;}
.si{padding:6px 9px;cursor:pointer;font-size:12px;}.si:hover{background:#eef6eb;}
.sub{border-top:2px solid #d9d0b8;padding-top:8px;}
.sr{display:flex;justify-content:space-between;width:215px;font-size:12px;color:#5a5040;margin-bottom:3px;}
.st{display:flex;justify-content:space-between;width:215px;font-weight:700;font-size:14px;color:#2e5228;border-top:1px solid #c0b898;padding-top:4px;margin-top:2px;}
.bt{width:100%;border-collapse:collapse;font-size:12px;}
.bt th{background:#3a6b35;color:#fff;padding:6px 9px;text-align:right;font-weight:700;}
.bt td{padding:5px 9px;border-bottom:1px solid #e0d8c0;vertical-align:top;}
.bt tr:last-child td{border-bottom:none;}
.ov{position:fixed;inset:0;background:rgba(20,15,5,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px;}
.modal{background:#fffdf7;border-radius:14px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:22px;}
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#3a6b35;color:#fff;padding:8px 20px;border-radius:30px;font-weight:700;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none;}
.ic{background:#f0f5ee;border-radius:7px;padding:10px;margin-top:6px;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;}
#bbar{margin-top:16px;border-top:1px solid #d9d0b8;padding:11px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;}
@media (max-width:600px){
  #header{padding:10px 11px 0;}
  .logo-t{font-size:13px;}
  .logo-s{font-size:10px;}
  #main{padding:10px;}
  .tab{padding:6px 9px;font-size:11px;}
  .ig{grid-template-columns:78px 1fr 42px 56px 22px;gap:4px;}
  .modal{padding:15px;max-width:100%;}
  .two{grid-template-columns:1fr;}
  input,select,textarea{font-size:16px!important;}
  .sr,.st{width:100%;}
  .fr{gap:6px;}
  .card{border-radius:9px;}
}
@media print{#header,.tab,#bbar,.np{display:none!important;}}
/* ── MOBILE IMPROVEMENTS ── */
@media (max-width: 600px){
  #header{padding:12px 12px 0;}
  .logo-t{font-size:13px;}
  #main{padding:10px;}
  .tab{padding:7px 10px;font-size:12px;}
  .ig{grid-template-columns:80px 1fr 44px 58px 22px;gap:4px;}
  .bt{font-size:11px;}
  .bt th,.bt td{padding:4px 6px;}
  .modal{padding:16px;}
  .two{grid-template-columns:1fr;}
  input,select,textarea{font-size:16px!important;} /* prevent iOS zoom */
  .sr,.st{width:100%;}
  .fr{flex-direction:column;gap:6px;}
  .fb{min-width:unset;}
}
/* Safe area for iPhone notch */
#header{padding-top:max(14px,env(safe-area-inset-top));}
body{padding-bottom:env(safe-area-inset-bottom);}
</style>
</head>
<body>
<div id="header">
  <div class="logo">
    <div style="font-size:26px;">🌿</div>
    <div><div class="logo-t">יומן מתן רביד גינון והשקיה</div><div class="logo-s">עוזר יומי לגנן</div></div>
  </div>
  <div class="tabs">
    <button class="tab" onclick="go('calendar')">📅 לוח שנה</button>
    <button class="tab" onclick="go('day')">📋 יומן יומי</button>
    <button class="tab" onclick="go('month')">📊 חודשי</button>
    <button class="tab" onclick="go('customers')">👤 לקוחות</button>
  </div>
</div>
<div id="main"></div>
<div id="bbar">
  <span style="font-size:11px;color:#7a6e55;font-weight:700;">שמירת נתונים:</span>
  <button class="btn bo bsm" onclick="exportD()">💾 ייצוא גיבוי</button>
  <label class="btn bo bsm" style="cursor:pointer;">📂 טעינת גיבוי
    <input type="file" accept=".json" style="display:none;width:auto;" onchange="importD(event)">
  </label>
  <button id="install-btn" class="btn bg bsm" style="display:none;" onclick="installApp()">📱 התקן כאפליקציה</button>
  <span style="font-size:10px;color:#7a6e55;">(הנתונים נשמרים בדפדפן אוטומטית)</span>
  <span id="save-status" style="font-size:11px;font-weight:700;color:#3a6b35;"></span>
</div>
<div id="modal-wrap"></div>
<div id="toast"></div>
<script>

// ── CONSTANTS ──
const MN=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const DY=["א'","ב'","ג'","ד'","ה'","ו'","ש'"];
const PS=['כוסית','עציץ 12','גודל 4','10 ליטר','25 ליטר','50 ליטר','70 ליטר'];
const FR=['דשן למשאבת דישון','דישון לדשא','דישון לעצים','אחר'];
const CT=['צמחים','דשן','ריסוס','אחר'];

// ── HOLIDAYS ──
const HL={
'2024-10-02':['ראש השנה','h'],'2024-10-03':["ב' ר\"ה",'h'],
'2024-10-11':['ערב יוה"כ','h'],'2024-10-12':['יום כיפור','h'],
'2024-10-16':['סוכות','h'],'2024-10-17':['סוכות','v'],'2024-10-18':['חוה"מ','v'],
'2024-10-19':['חוה"מ','v'],'2024-10-20':['חוה"מ','v'],'2024-10-21':['חוה"מ','v'],
'2024-10-23':['שמיני עצרת','h'],'2024-10-24':['שמחת תורה','h'],
'2024-12-25':['חנוכה','h'],'2024-12-26':['חנוכה','v'],'2024-12-27':['חנוכה','v'],
'2024-12-28':['חנוכה','v'],'2024-12-29':['חנוכה','v'],'2024-12-30':['חנוכה','v'],
'2024-12-31':['חנוכה','v'],'2025-01-01':['חנוכה','v'],'2025-01-02':['חנוכה','h'],
'2025-02-13':['ט"ו בשבט','h'],
'2025-03-13':['תענית אסתר','h'],'2025-03-14':['פורים','h'],
'2025-04-12':['ערב פסח','h'],'2025-04-13':['פסח','h'],'2025-04-14':['פסח','v'],
'2025-04-15':['חוה"מ פסח','v'],'2025-04-16':['חוה"מ פסח','v'],'2025-04-17':['חוה"מ פסח','v'],
'2025-04-18':['חוה"מ פסח','v'],'2025-04-19':['חוה"מ פסח','v'],'2025-04-20':['שביעי פסח','h'],
'2025-04-27':['יום השואה','m'],
'2025-04-30':['יום הזיכרון','m'],'2025-05-01':['יום העצמאות','h'],
'2025-05-26':['ל"ג בעומר','h'],
'2025-06-01':['ערב שבועות','h'],'2025-06-02':['שבועות','h'],'2025-06-03':['שבועות','v'],
'2025-08-12':['תשעה באב','h'],
};
// Summer 2025
for(let d=1;d<=31;d++)HL['2025-07-'+String(d).padStart(2,'0')]=['חופש קיץ','v'];
for(let d=1;d<=31;d++){if(d!==12)HL['2025-08-'+String(d).padStart(2,'0')]=['חופש קיץ','v'];}
// 5786 (2025-2026)
Object.assign(HL,{
'2025-09-22':['ראש השנה','h'],'2025-09-23':["ב' ר\"ה",'h'],'2025-09-24':['צום גדליה','h'],
'2025-10-01':['ערב יוה"כ','h'],'2025-10-02':['יום כיפור','h'],
'2025-10-06':['סוכות','h'],'2025-10-07':['סוכות','v'],'2025-10-08':['חוה"מ','v'],
'2025-10-09':['חוה"מ','v'],'2025-10-10':['חוה"מ','v'],'2025-10-11':['חוה"מ','v'],
'2025-10-12':['חוה"מ','v'],'2025-10-13':['שמיני עצרת','h'],'2025-10-14':['שמחת תורה','h'],
'2025-12-14':['חנוכה','h'],'2025-12-15':['חנוכה','v'],'2025-12-16':['חנוכה','v'],
'2025-12-17':['חנוכה','v'],'2025-12-18':['חנוכה','v'],'2025-12-19':['חנוכה','v'],
'2025-12-20':['חנוכה','v'],'2025-12-21':['חנוכה','v'],'2025-12-22':['חנוכה','h'],
'2026-02-01':['ט"ו בשבט','h'],
'2026-03-02':['פורים','h'],'2026-03-03':['שושן פורים','h'],
'2026-03-29':['ערב פסח','h'],'2026-03-30':['פסח','h'],'2026-03-31':['פסח','v'],
'2026-04-01':['חוה"מ פסח','v'],'2026-04-02':['חוה"מ פסח','v'],'2026-04-03':['חוה"מ פסח','v'],
'2026-04-04':['חוה"מ פסח','v'],'2026-04-05':['חוה"מ פסח','v'],'2026-04-06':['שביעי פסח','h'],
'2026-04-16':['יום השואה','m'],
'2026-04-22':['יום הזיכרון','m'],'2026-04-23':['יום העצמאות','h'],
'2026-05-14':['ל"ג בעומר','h'],
'2026-05-21':['ערב שבועות','h'],'2026-05-22':['שבועות','h'],'2026-05-23':['שבועות','v'],
'2026-07-23':['תשעה באב','h'],
});
for(let d=1;d<=31;d++)HL['2026-07-'+String(d).padStart(2,'0')]=['חופש קיץ','v'];
for(let d=1;d<=31;d++)HL['2026-08-'+String(d).padStart(2,'0')]=['חופש קיץ','v'];

// ── STATE ──
const SK='gardener_v3';
let S={customers:[],visits:{},savedPlants:[],nextId:1};
let UI={view:'calendar',yr:new Date().getFullYear(),mo:new Date().getMonth(),
        day:new Date().toISOString().slice(0,10),modal:null,addCust:false,billData:null};

function save(){
  try{
    const json=JSON.stringify(S);
    localStorage.setItem(SK,json);
    // גיבוי כפול במפתח שני
    localStorage.setItem(SK+'_backup',json);
  }catch(e){
    console.error('שגיאת שמירה:',e);
  }
}
function loadS(){
  try{
    let r=localStorage.getItem(SK);
    if(!r)r=localStorage.getItem(SK+'_backup'); // נסה גיבוי
    if(r){const p=JSON.parse(r);if(p&&Array.isArray(p.customers)){S=p;return;}}
  }catch(e){console.error('שגיאת טעינה:',e);}
}

// ── HELPERS ──
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dkey(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function fd1(y,m){return new Date(y,m,1).getDay();}
function fdate(s){const[y,m,d]=s.split('-').map(Number);return DY[new Date(y,m-1,d).getDay()]+' '+d+' '+MN[m-1]+' '+y;}
function hol(ds){return HL[ds]||null;}
function vt(v){
  const f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
  return f1+(f2*1.18)+(v.items||[]).reduce((s,it)=>s+(it.qty||0)*(parseFloat(it.price)||0),0);
}
function ni(){return {id:Date.now()+'_'+Math.random().toString(36).slice(2),cat:'צמחים',name:'',size:'כוסית',qty:1,price:''};}
function vim(y,m){
  const mk=y+'-'+String(m+1).padStart(2,'0');
  return Object.entries(S.visits).filter(([k])=>k.startsWith(mk)).flatMap(([k,vs])=>vs.map(v=>({...v,date:k})));
}
function fv(ds,vid){return(S.visits[ds]||[]).find(v=>v.id===vid);}
function fi(ds,vid,iid){const v=fv(ds,vid);return v?(v.items||[]).find(i=>i.id===iid):null;}

// ── TOAST ──
let tt=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';if(tt)clearTimeout(tt);tt=setTimeout(()=>t.style.display='none',2500);}

// ── TABS ──
function go(v){UI.view=v;UI.addCust=false;render();}
function upTabs(){document.querySelectorAll('.tab').forEach(t=>{const m=t.getAttribute('onclick').match(/'([^']+)'/);t.classList.toggle('on',m&&m[1]===UI.view);});}

// ── RENDER ──
function render(){
  save();
  document.getElementById('main').innerHTML=rv();
  document.getElementById('modal-wrap').innerHTML=UI.modal?rm():'';
  upTabs();
  setupAC();
  showSaveStatus();
}

function rv(){
  if(UI.view==='calendar')return rCal();
  if(UI.view==='day')return rDay();
  if(UI.view==='month')return rMon();
  return rCust();
}

// ── CALENDAR ──
function rCal(){
  const ts=new Date().toISOString().slice(0,10);
  let h='';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
  h+='<button class="btn bo bsm" onclick="prevM()">← הקודם</button>';
  h+='<div style="font-size:17px;font-weight:700;color:#2e5228;">'+MN[UI.mo]+' '+UI.yr+'</div>';
  h+='<button class="btn bo bsm" onclick="nextM()">הבא →</button></div>';
  h+='<div class="legend">';
  h+='<span class="ldot" style="background:#c0392b;"></span>חג &nbsp;';
  h+='<span class="ldot" style="background:#2980b9;"></span>חופשה &nbsp;';
  h+='<span class="ldot" style="background:#7f8c8d;"></span>יום זיכרון</div>';
  h+='<div class="card" style="padding:10px;">';
  h+='<div class="cgrid" style="margin-bottom:3px;">';
  DY.forEach(d=>{h+='<div class="chdr">'+d+'</div>';});
  h+='</div><div class="cgrid">';
  const st=fd1(UI.yr,UI.mo);
  for(let i=0;i<st;i++)h+='<div></div>';
  const days=dim(UI.yr,UI.mo);
  for(let d=1;d<=days;d++){
    const ds=dkey(UI.yr,UI.mo,d);
    const vs=(S.visits[ds]||[]);
    const hd=hol(ds);
    const isT=ds===ts;
    let cls='dc';
    if(isT)cls+=' tod';
    else if(hd&&hd[1]==='h')cls+=' hh';
    else if(hd&&hd[1]==='v')cls+=' hv2';
    else if(hd&&hd[1]==='m')cls+=' hm';
    else if(vs.length)cls+=' hv';
    const hc=hd?(hd[1]==='h'?'#c0392b':hd[1]==='v'?'#2980b9':'#7f8c8d'):null;
    const nc=isT?'#3a6b35':(hc||'#2c2c1e');
    h+='<div class="'+cls+'" onclick="goDay(\''+ds+'\')">';
    h+='<div class="dc-n" style="font-weight:'+(isT?700:400)+';color:'+nc+';">'+d+'</div>';
    if(hd)h+='<div class="dc-h" style="color:'+hc+';">'+e(hd[0])+'</div>';
    const names=[...new Set(vs.map(v=>{const c=S.customers.find(c=>c.id===v.custId);return c?c.name.split(' ')[0]:'?';}))];
    if(names[0])h+='<div class="dc-c">'+e(names[0])+'</div>';
    if(names.length>1)h+='<div style="font-size:8px;color:#7a6e55;">+'+(names.length-1)+'</div>';
    h+='</div>';
  }
  h+='</div></div>';
  const mv=vim(UI.yr,UI.mo);
  const rev=mv.reduce((s,v)=>s+vt(v),0);
  if(mv.length>0){
    h+='<div class="card" style="padding:8px 12px;margin-top:8px;font-size:13px;">';
    h+='<span style="color:#7a6e55;">סיכום: </span><b>'+mv.length+'</b> ביקורים &nbsp;·&nbsp; ';
    h+='<b style="color:#3a6b35;">₪'+rev.toFixed(2)+'</b> הכנסה</div>';
  }else{
