<style>
:root {
  --green:    #3a6b35;
  --green-d:  #2e5228;
  --green-l:  #7a9e72;
  --green-bg: #eef6eb;
  --sage:     #f0f5ee;
  --cream:    #fffdf7;
  --border:   #d9d0b8;
  --text:     #2c2c1e;
  --muted:    #7a6e55;
  --sand:     #f5f0e8;
  --red:      #b5673d;
  --red-bg:   #f5e8e0;
  --wa:       #25D366;
  --font:     'Heebo', Arial, sans-serif;
  --radius:   10px;
  --shadow:   0 2px 10px rgba(60,50,20,.09);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--sand);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  cursor: pointer; border: none; border-radius: 7px;
  padding: 8px 14px; font-family: var(--font); font-size: 13px; font-weight: 700;
  transition: all .15s; text-decoration: none; white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.bg  { background: var(--green);  color: #fff; }
.bg:hover  { background: var(--green-d); }
.bs  { background: var(--green-l); color: #fff; }
.bs:hover  { background: #5e7e56; }
.bo  { background: transparent; color: var(--green); border: 1.5px solid var(--green); }
.bo:hover  { background: var(--green); color: #fff; }
.br  { background: var(--red-bg); color: var(--red); border: 1px solid #e0c8b8; }
.br:hover  { background: #ead0c0; }
.bw  { background: var(--wa); color: #fff; }
.bw:hover  { background: #1da851; }
.bsm { padding: 5px 10px; font-size: 12px; }
.bxs { padding: 3px 8px;  font-size: 11px; border-radius: 5px; }

/* ── CARD ── */
.card {
  background: var(--cream); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
}

/* ── INPUTS ── */
input, textarea, select {
  font-family: var(--font);
  border: 1.5px solid #c9c0a0; border-radius: 7px;
  padding: 8px 10px; font-size: 16px; /* 16px prevents iOS zoom */
  background: #fff; color: var(--text); width: 100%; outline: none;
}
input:focus, textarea:focus, select:focus { border-color: var(--green); }
textarea { resize: vertical; }
.lbl {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 5px;
}

/* ── HEADER ── */
#header {
  background: linear-gradient(135deg, #2e5228, #3a6b35, #4a8040);
  padding: max(14px, env(safe-area-inset-top)) 16px 0;
  box-shadow: 0 4px 20px rgba(30,50,20,.25);
  position: sticky; top: 0; z-index: 40;
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.logo-icon { font-size: 28px; }
.logo-title { color: #fff; font-size: 16px; font-weight: 800; line-height: 1.2; }
.logo-sub   { color: #a8d4a0; font-size: 11px; margin-top: 1px; font-weight: 400; }

/* ── TABS ── */
.tabs { display: flex; gap: 3px; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; cursor: pointer; padding: 9px 13px;
  border-radius: 8px 8px 0 0; font-weight: 700; font-size: 12px;
  border: none; background: transparent; color: rgba(255,255,255,.75);
  transition: all .15s; white-space: nowrap; font-family: var(--font);
}
.tab.on  { background: rgba(0,0,0,.25); color: #fff; }
.tab:hover:not(.on) { background: rgba(255,255,255,.12); color: #fff; }

/* ── MAIN ── */
#main { padding: 14px; max-width: 860px; margin: 0 auto; padding-bottom: max(14px, env(safe-area-inset-bottom)); }

/* ── CALENDAR ── */
.cgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.chdr  { text-align: center; font-size: 10px; font-weight: 700; color: var(--muted); padding: 3px 0; }
.dc {
  cursor: pointer; border-radius: 7px; padding: 5px 3px;
  min-height: 62px; border: 1.5px solid transparent;
  background: var(--cream); transition: all .15s;
}
.dc:hover  { background: #e8f0e4; border-color: #a8c89e; }
.dc.tod    { border-color: var(--green) !important; background: var(--green-bg); }
.dc.hv     { background: var(--sage); }
.dc.hh     { border-color: #e8b4b4; background: #fdf0f0; }
.dc.hv2    { border-color: #b4cce8; background: #eaf4fb; }
.dc.hm     { border-color: #c8c8c8; background: #f2f3f4; }
.dc-n      { font-size: 12px; margin-bottom: 2px; font-weight: 500; }
.dc-h      { font-size: 8px; font-weight: 700; line-height: 1.1; margin-bottom: 1px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.dc-c      { font-size: 8px; background: var(--green); color: #fff; border-radius: 3px; padding: 1px 3px; margin-bottom: 1px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

/* ── LEGEND ── */
.legend { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; font-size: 11px; align-items: center; }
.ldot   { width: 9px; height: 9px; border-radius: 3px; display: inline-block; margin-left: 4px; vertical-align: middle; }

/* ── VISIT CARD ── */
.vc  { margin-bottom: 13px; padding: 14px 15px; }
.vh  { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
.fr  { display: flex; gap: 9px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
.fb  { min-width: 130px; flex: 1; }

/* ── ITEM ROW ── */
.ir  { background: #f8f5ef; border-radius: 7px; padding: 8px 9px; margin-bottom: 6px; border: 1px solid #e0d8c0; }
.ig  { display: grid; grid-template-columns: 86px 1fr 48px 64px 24px; gap: 5px; align-items: center; }
.ig input, .ig select { font-size: 13px; padding: 6px 8px; }

/* ── AUTOCOMPLETE ── */
.acw  { position: relative; }
.sug  { position: absolute; top: 100%; right: 0; left: 0; background: #fff; border: 1.5px solid var(--green); border-top: none; border-radius: 0 0 7px 7px; z-index: 50; max-height: 130px; overflow-y: auto; display: none; box-shadow: 0 6px 16px rgba(0,0,0,.12); }
.sug.show { display: block; }
.si   { padding: 7px 10px; cursor: pointer; font-size: 13px; }
.si:hover { background: var(--green-bg); }

/* ── SUBTOTAL ── */
.sub  { border-top: 2px solid var(--border); padding-top: 10px; margin-top: 4px; }
.sr   { display: flex; justify-content: space-between; font-size: 13px; color: #5a5040; margin-bottom: 4px; max-width: 240px; }
.st   { display: flex; justify-content: space-between; font-weight: 700; font-size: 15px; color: var(--green); border-top: 1px solid #c0b898; padding-top: 5px; margin-top: 3px; max-width: 240px; }

/* ── TABLES ── */
.bt  { width: 100%; border-collapse: collapse; font-size: 12px; }
.bt th { background: var(--green); color: #fff; padding: 7px 9px; text-align: right; font-weight: 700; }
.bt td { padding: 5px 9px; border-bottom: 1px solid #e0d8c0; vertical-align: top; }
.bt tr:last-child td { border-bottom: none; }

/* ── MODAL OVERLAY ── */
.ov {
  position: fixed; inset: 0; background: rgba(20,15,5,.55);
  z-index: 100; display: flex; align-items: center; justify-content: center; padding: 14px;
  -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
}
.modal {
  background: var(--cream); border-radius: 14px;
  width: 100%; max-width: 660px; max-height: 90vh;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  box-shadow: 0 24px 64px rgba(0,0,0,.3); padding: 22px;
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: max(26px, env(safe-area-inset-bottom, 26px));
  left: 50%; transform: translateX(-50%);
  background: var(--green); color: #fff;
  padding: 9px 22px; border-radius: 30px;
  font-weight: 700; font-size: 13px; z-index: 999;
  box-shadow: 0 4px 18px rgba(0,0,0,.22); display: none;
  white-space: nowrap;
}

/* ── INLINE ADD CUSTOMER ── */
.ic  { background: var(--sage); border-radius: 8px; padding: 11px; margin-top: 7px; }
.two { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }

/* ── BACKUP BAR ── */
#bbar {
  border-top: 1px solid var(--border); padding: 11px 14px;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: center;
  background: var(--cream); font-family: var(--font);
}

/* ── INSTALL BANNER ── */
#install-banner {
  display: none; margin: 12px 14px 0;
  background: linear-gradient(135deg, #2e5228, #3a6b35);
  border-radius: var(--radius); padding: 12px 16px;
  align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
}
#install-banner.show { display: flex; }
.install-text { color: #fff; font-size: 13px; font-weight: 700; }
.install-sub  { color: #a8d4a0; font-size: 11px; margin-top: 1px; }

/* ── PRINT ── */
@media print { #header, .tab, #bbar, #install-banner, .np { display: none !important; } }

/* ── MOBILE ── */
@media (max-width: 500px) {
  .logo-title { font-size: 13px; }
  .tab { padding: 8px 10px; font-size: 11px; }
  #main { padding: 10px; }
  .ig  { grid-template-columns: 78px 1fr 42px 56px 22px; gap: 4px; }
  .ig input, .ig select { font-size: 12px; padding: 5px 6px; }
  .modal { padding: 15px; }
  .two { grid-template-columns: 1fr; }
  .sr, .st { max-width: 100%; }
  .fr { gap: 7px; }
  .bt { font-size: 11px; }
  .bt th, .bt td { padding: 4px 6px; }
}
</style>
</head>

function dim(y,m){return new Date(y,m+1,0).getDate();}
function fd1(y,m){return new Date(y,m,1).getDay();}
function fdate(s){const[y,m,d]=s.split('-').map(Number);return DY[new Date(y,m-1,d).getDay()]+' '+d+' '+MN[m-1]+' '+y;}
function hol(ds){return HL[ds]||null;}
function vt(v){
  const f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
  return f1+(f2*1.18)+(v.items||[]).reduce((s,it)=>s+(it.qty||0)*(parseFloat(it.price)||0),0);
}
function ni(){return {id:Date.now()+'_'+Math.random().toString(36).slice(2),cat:'צמחים',name:'',size:'כוסית',qty:1,price:''};}
function vim(y,m){
  const mk=y+'-'+String(m+1).padStart(2,'0');
  return Object.entries(S.visits).filter(([k])=>k.startsWith(mk)).flatMap(([k,vs])=>vs.map(v=>({...v,date:k})));
}
function fv(ds,vid){return(S.visits[ds]||[]).find(v=>v.id===vid);}
function fi(ds,vid,iid){const v=fv(ds,vid);return v?(v.items||[]).find(i=>i.id===iid):null;}

// ── TOAST ──
let tt=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';if(tt)clearTimeout(tt);tt=setTimeout(()=>t.style.display='none',2500);}

// ── TABS ──
function go(v){UI.view=v;UI.addCust=false;render();}
function upTabs(){document.querySelectorAll('.tab').forEach(t=>{const m=t.getAttribute('onclick').match(/'([^']+)'/);t.classList.toggle('on',m&&m[1]===UI.view);});}

// ── RENDER ──
function render(){
  save();
  document.getElementById('main').innerHTML=rv();
  document.getElementById('modal-wrap').innerHTML=UI.modal?rm():'';
  upTabs();
  setupAC();
  showSaveStatus();
}

function rv(){
  if(UI.view==='calendar')return rCal();
  if(UI.view==='day')return rDay();
  if(UI.view==='month')return rMon();
  return rCust();
}

// ── CALENDAR ──
function rCal(){
  const ts=new Date().toISOString().slice(0,10);
  let h='';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
  h+='<button class="btn bo bsm" onclick="prevM()">← הקודם</button>';
  h+='<div style="font-size:17px;font-weight:700;color:#2e5228;">'+MN[UI.mo]+' '+UI.yr+'</div>';
  h+='<button class="btn bo bsm" onclick="nextM()">הבא →</button></div>';
  h+='<div class="legend">';
  h+='<span class="ldot" style="background:#c0392b;"></span>חג &nbsp;';
  h+='<span class="ldot" style="background:#2980b9;"></span>חופשה &nbsp;';
  h+='<span class="ldot" style="background:#7f8c8d;"></span>יום זיכרון</div>';
  h+='<div class="card" style="padding:10px;">';
  h+='<div class="cgrid" style="margin-bottom:3px;">';
  DY.forEach(d=>{h+='<div class="chdr">'+d+'</div>';});
  h+='</div><div class="cgrid">';
  const st=fd1(UI.yr,UI.mo);
  for(let i=0;i<st;i++)h+='<div></div>';
  const days=dim(UI.yr,UI.mo);
  for(let d=1;d<=days;d++){
    const ds=dkey(UI.yr,UI.mo,d);
    const vs=(S.visits[ds]||[]);
    const hd=hol(ds);
    const isT=ds===ts;
    let cls='dc';
    if(isT)cls+=' tod';
    else if(hd&&hd[1]==='h')cls+=' hh';
    else if(hd&&hd[1]==='v')cls+=' hv2';
    else if(hd&&hd[1]==='m')cls+=' hm';
    else if(vs.length)cls+=' hv';
    const hc=hd?(hd[1]==='h'?'#c0392b':hd[1]==='v'?'#2980b9':'#7f8c8d'):null;
    const nc=isT?'#3a6b35':(hc||'#2c2c1e');
    h+='<div class="'+cls+'" onclick="goDay(\''+ds+'\')">';
    h+='<div class="dc-n" style="font-weight:'+(isT?700:400)+';color:'+nc+';">'+d+'</div>';
    if(hd)h+='<div class="dc-h" style="color:'+hc+';">'+e(hd[0])+'</div>';
    const names=[...new Set(vs.map(v=>{const c=S.customers.find(c=>c.id===v.custId);return c?c.name.split(' ')[0]:'?';}))];
    if(names[0])h+='<div class="dc-c">'+e(names[0])+'</div>';
    if(names.length>1)h+='<div style="font-size:8px;color:#7a6e55;">+'+(names.length-1)+'</div>';
    h+='</div>';
  }
  h+='</div></div>';
  const mv=vim(UI.yr,UI.mo);
  const rev=mv.reduce((s,v)=>s+vt(v),0);
  if(mv.length>0){
    h+='<div class="card" style="padding:8px 12px;margin-top:8px;font-size:13px;">';
    h+='<span style="color:#7a6e55;">סיכום: </span><b>'+mv.length+'</b> ביקורים &nbsp;·&nbsp; ';
    h+='<b style="color:#3a6b35;">₪'+rev.toFixed(2)+'</b> הכנסה</div>';
  }else{
    h+='<div class="card" style="padding:8px 12px;margin-top:8px;color:#7a6e55;font-size:12px;">אין ביקורים החודש. לחץ על יום להוספה.</div>';
  }
  return h;
}
function prevM(){if(UI.mo===0){UI.mo=11;UI.yr--;}else UI.mo--;render();}
function nextM(){if(UI.mo===11){UI.mo=0;UI.yr++;}else UI.mo++;render();}
function goDay(ds){UI.day=ds;go('day');}

function rVisit(v,ds){
  const c=S.customers.find(c=>c.id===v.custId);
  const f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
  const f2v=f2*1.18;
  const it=(v.items||[]).reduce((s,i)=>s+(i.qty||0)*(parseFloat(i.price)||0),0);
  const tot=f1+f2v+it;
  let h='<div class="card vc">';
  h+='<div class="vh">';
  h+='<div><div style="font-size:14px;font-weight:700;color:#2e5228;">🏡 '+e(c?c.name:'לקוח לא ידוע')+'</div>';
  h+='<div style="font-size:11px;color:#7a6e55;margin-top:1px;">📍 '+e(c?c.address:'')+'</div></div>';
  h+='<button class="btn br bxs" onclick="delV(\''+ds+'\',\''+v.id+'\')">הסר</button></div>';
  // notes
  h+='<div style="margin-bottom:9px;"><span class="lbl">הערות עבודה</span>';
  h+='<textarea rows="2" placeholder="תאר את העבודה שבוצעה..." onchange="upNotes(\''+ds+'\',\''+v.id+'\',this.value)">'+e(v.notes||'')+'</textarea></div>';
  // fees
  h+='<div class="fr">';
  h+='<div class="fb"><span class="lbl">עלות ביקור 1 (₪)</span>';
  h+='<input type="number" min="0" step="1" placeholder="הכנס עלות..." value="'+e(v.fee===''||v.fee===undefined?'':v.fee)+'" onchange="upFee(\''+ds+'\',\''+v.id+'\',\'fee\',this.value)"></div>';
  h+='<div class="fb"><span class="lbl">עלות ביקור 2 + מע״מ (₪)</span>';
  h+='<input type="number" min="0" step="1" placeholder="הכנס עלות..." value="'+e(v.fee2===''||v.fee2===undefined?'':v.fee2)+'" onchange="upFee(\''+ds+'\',\''+v.id+'\',\'fee2\',this.value)">';
  if(f2>0)h+='<div style="font-size:11px;color:#7a6e55;margin-top:2px;">+ 18% מע״מ = ₪'+f2v.toFixed(2)+'</div>';
  h+='</div>';
  h+='<div style="font-size:10px;color:#7a6e55;align-self:flex-end;padding-bottom:4px;">💡 עלות 1 נשמרת ללקוח</div>';
  h+='</div>';
  // items
  h+='<div style="margin-bottom:9px;"><span class="lbl">פריטים שנוספו</span>';
  (v.items||[]).forEach(item=>{h+=rItem(item,ds,v.id);});
  h+='<button class="btn bs bsm" style="margin-top:4px;" onclick="addI(\''+ds+'\',\''+v.id+'\')">+ הוסף פריט</button></div>';
  // subtotal
  h+='<div class="sub">';
  if(f1>0)h+='<div class="sr"><span>עלות ביקור 1</span><span>₪'+f1.toFixed(2)+'</span></div>';
  if(f2>0)h+='<div class="sr"><span>עלות ביקור 2 + מע״מ</span><span>₪'+f2v.toFixed(2)+'</span></div>';
  if(it>0)h+='<div class="sr"><span>פריטים</span><span>₪'+it.toFixed(2)+'</span></div>';
  h+='<div class="st"><span>סה״כ</span><span>₪'+tot.toFixed(2)+'</span></div>';
  h+='</div></div>';
  return h;
}

function rItem(item,ds,vid){
  let h='<div class="ir">';
  h+='<div class="ig">';
  // category
  let cats='';
  CT.forEach(c=>{cats+='<option'+(c===item.cat?' selected':'')+'>'+e(c)+'</option>';});
  h+='<select onchange="upCat(\''+ds+'\',\''+vid+'\',\''+item.id+'\',this.value)">'+cats+'</select>';
  // name
  if(item.cat==='צמחים'){
    h+='<div class="acw">';
    h+='<input type="text" class="pi" placeholder="שם הצמח..." value="'+e(item.name)+'" data-ds="'+ds+'" data-vid="'+vid+'" data-iid="'+item.id+'">';
    h+='<div class="sug" id="sg-'+item.id+'"></div></div>';
  }else if(item.cat==='דשן'){
    let fo='<option value="">בחר סוג דשן...</option>';
    FR.forEach(o=>{fo+='<option'+(o===item.name?' selected':'')+'>'+e(o)+'</option>';});
    h+='<select onchange="upIF(\''+ds+'\',\''+vid+'\',\''+item.id+'\',\'name\',this.value)">'+fo+'</select>';
  }else{
    const ph=item.cat==='ריסוס'?'סוג ריסוס...':'תיאור...';
    h+='<input type="text" placeholder="'+ph+'" value="'+e(item.name)+'" onchange="upIF(\''+ds+'\',\''+vid+'\',\''+item.id+'\',\'name\',this.value)">';
  }
  h+='<input type="number" min="1" value="'+item.qty+'" style="text-align:center;" onchange="upIF(\''+ds+'\',\''+vid+'\',\''+item.id+'\',\'qty\',this.value)">';
  h+='<input type="number" min="0" step="0.01" value="'+e(item.price)+'" placeholder="₪" onchange="upIF(\''+ds+'\',\''+vid+'\',\''+item.id+'\',\'price\',this.value)">';
  h+='<button onclick="delI(\''+ds+'\',\''+vid+'\',\''+item.id+'\')" style="background:none;border:none;cursor:pointer;color:#b5673d;font-size:15px;padding:0;">✕</button>';
  h+='</div>';
  if(item.cat==='צמחים'){
    let so='';
    PS.forEach(s=>{so+='<option'+(s===item.size?' selected':'')+'>'+e(s)+'</option>';});
    h+='<div style="display:flex;gap:5px;align-items:center;margin-top:5px;">';
    h+='<span style="font-size:10px;color:#7a6e55;font-weight:700;">גודל:</span>';
    h+='<select style="width:108px;font-size:11px;" onchange="upIF(\''+ds+'\',\''+vid+'\',\''+item.id+'\',\'size\',this.value)">'+so+'</select></div>';
  }
  h+='</div>';
  return h;
}

// ── MONTH VIEW ──
function rMon(){
  let h='';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
  h+='<button class="btn bo bsm" onclick="prevM()">← הקודם</button>';
  h+='<div style="font-size:17px;font-weight:700;color:#2e5228;">'+MN[UI.mo]+' '+UI.yr+' — סיכום</div>';
  h+='<button class="btn bo bsm" onclick="nextM()">הבא →</button></div>';
  const allV=vim(UI.yr,UI.mo);
  const byC=S.customers.map(c=>({c,vs:allV.filter(v=>v.custId===c.id)})).filter(x=>x.vs.length>0).map(x=>({...x,tot:x.vs.reduce((s,v)=>s+vt(v),0)}));
  const gr=byC.reduce((s,x)=>s+x.tot,0);
  if(!byC.length){h+='<div class="card" style="padding:20px;text-align:center;color:#7a6e55;"><div style="font-size:28px;margin-bottom:5px;">📊</div>אין ביקורים החודש.</div>';return h;}
  byC.forEach(({c,vs,tot})=>{
    h+='<div class="card" style="margin-bottom:10px;padding:12px 15px;">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;">';
    h+='<div><div style="font-size:14px;font-weight:700;color:#2e5228;">'+e(c.name)+'</div>';
    h+='<div style="font-size:11px;color:#7a6e55;">'+vs.length+' ביקורים</div></div>';
    h+='<div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;">';
    h+='<div style="font-weight:700;font-size:15px;color:#3a6b35;">₪'+tot.toFixed(2)+'</div>';
    h+='<button class="btn bg bsm" onclick="showBill('+c.id+','+UI.yr+','+UI.mo+')">📄 חשבונית</button>';
    h+='<button class="btn bw bsm" onclick="custWA('+c.id+','+UI.yr+','+UI.mo+')">💬 וואטסאפ</button>';
    h+='</div></div>';
    h+='<table class="bt"><thead><tr><th>תאריך</th><th>עלות 1</th><th>עלות 2+מע״מ</th><th>פריטים</th><th>סה״כ</th></tr></thead><tbody>';
    vs.forEach(v=>{
      const[,mm,dd]=v.date.split('-').map(Number);
      const f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
      const il=v.items&&v.items.length?v.items.map(i=>e(i.name)+'('+i.qty+')').join(', '):'—';
      h+='<tr><td>'+dd+'/'+mm+'</td><td>'+(f1?'₪'+f1.toFixed(2):'—')+'</td><td>'+(f2?'₪'+(f2*1.18).toFixed(2):'—')+'</td><td style="font-size:11px;">'+il+'</td><td style="font-weight:700;">₪'+vt(v).toFixed(2)+'</td></tr>';
    });
    h+='</tbody></table></div>';
  });
  h+='<div class="card" style="padding:12px 15px;background:#eef6eb;border:2px solid #3a6b35;">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:9px;">';
  h+='<div><div style="font-size:12px;color:#5a5040;"><b>'+allV.length+'</b> ביקורים · <b>'+byC.length+'</b> לקוחות</div>';
  h+='<div style="font-weight:700;font-size:18px;color:#2e5228;">סה״כ חודשי: ₪'+gr.toFixed(2)+'</div></div>';
  h+='<div style="display:flex;gap:7px;flex-wrap:wrap;">';
  h+='<button class="btn bg" onclick="copyAll()">📋 העתק את כל החשבוניות</button>';
  h+='<button class="btn bw" onclick="sendAll()">💬 שלח הכל לוואטסאפ</button>';
  h+='</div></div></div>';
  return h;
}

  h+='<div style="font-size:11px;color:#7a6e55;margin-top:2px;">שירותי גינון מקצועיים</div></div>';
  h+='<div style="text-align:right;"><div style="font-size:16px;font-weight:700;color:#b5673d;">חשבונית</div>';
  h+='<div style="font-size:11px;color:#7a6e55;">תקופה: '+month+' '+year+'</div>';
  h+='<div style="font-size:11px;color:#7a6e55;">תאריך: '+new Date().toLocaleDateString('he-IL')+'</div></div></div>';
  h+='<div style="background:#f5f0e8;border-radius:7px;padding:9px 12px;margin-bottom:13px;">';
  h+='<div style="font-size:9px;font-weight:700;letter-spacing:1px;color:#7a6e55;margin-bottom:3px;">לכבוד</div>';
  h+='<div style="font-weight:700;font-size:13px;">'+e(cust.name)+'</div>';
  h+='<div style="font-size:11px;color:#5a5040;">'+e(cust.address)+'</div>';
  h+='<div style="font-size:11px;color:#5a5040;">'+e(cust.phone)+'</div></div>';
  h+='<table class="bt" style="margin-bottom:13px;"><thead><tr><th>תאריך</th><th>תיאור</th><th>סכום</th></tr></thead><tbody>';
  visits.forEach(v=>{
    const[,mm,dd]=v.date.split('-').map(Number);
    const f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
    h+='<tr><td style="white-space:nowrap;">'+dd+'/'+mm+'/'+year+'</td><td>';
    if(v.notes)h+='<div style="font-style:italic;color:#5a5040;margin-bottom:2px;">'+e(v.notes)+'</div>';
    if(f1>0)h+='<div>עלות ביקור 1: ₪'+f1.toFixed(2)+'</div>';
    if(f2>0)h+='<div>עלות ביקור 2 + מע״מ 18%: ₪'+(f2*1.18).toFixed(2)+'</div>';
    (v.items||[]).forEach(it=>{h+='<div style="color:#5a5040;">• '+e(it.name)+(it.size&&it.cat==='צמחים'?' ('+e(it.size)+')':'')+' × '+it.qty+' @ ₪'+(parseFloat(it.price)||0)+'</div>';});
    h+='</td><td style="font-weight:600;text-align:left;">₪'+vt(v).toFixed(2)+'</td></tr>';
  });
  h+='</tbody></table>';
  h+='<div style="display:flex;justify-content:flex-end;"><div style="min-width:185px;">';
  h+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:1px solid #d0c8b0;font-size:14px;font-weight:700;color:#2e5228;">';
  h+='<span>סה״כ לתשלום</span><span>₪'+total.toFixed(2)+'</span></div></div></div>';
  h+='<div style="margin-top:18px;padding-top:11px;border-top:1px dashed #d0c8b0;font-size:11px;color:#7a6e55;text-align:center;">תודה על אמונך! התשלום נדרש תוך 14 יום. 🌿</div>';
  h+='</div></div></div>';
  return h;
}

// ── ACTIONS ──
function addV(ds,cid){
  const c=S.customers.find(c=>c.id===cid);
  const v={id:Date.now()+'_'+Math.random().toString(36).slice(2),custId:cid,fee:c&&c.defaultFee!==undefined?c.defaultFee:'',fee2:'',notes:'',items:[]};
  if(!S.visits[ds])S.visits[ds]=[];
  S.visits[ds].push(v);save();render();toast('ביקור נוסף ✓');
}
function delV(ds,vid){S.visits[ds]=(S.visits[ds]||[]).filter(v=>v.id!==vid);save();render();toast('ביקור הוסר');}
function upNotes(ds,vid,val){const v=fv(ds,vid);if(v){v.notes=val;save();}}
function upFee(ds,vid,key,val){
  const v=fv(ds,vid);if(!v)return;
  v[key]=val===''?'':parseFloat(val);
  if(key==='fee'){const c=S.customers.find(c=>c.id===v.custId);if(c)c.defaultFee=v.fee;}
  save();render();
}
function addI(ds,vid){const v=fv(ds,vid);if(!v)return;if(!v.items)v.items=[];v.items.push(ni());save();render();}
function delI(ds,vid,iid){const v=fv(ds,vid);if(!v)return;v.items=v.items.filter(i=>i.id!==iid);save();render();}
function upCat(ds,vid,iid,val){const i=fi(ds,vid,iid);if(!i)return;i.cat=val;i.name='';i.size='כוסית';save();render();}
function upIF(ds,vid,iid,field,val){
  const i=fi(ds,vid,iid);if(!i)return;
  if(field==='qty')i.qty=parseInt(val)||1;
  else if(field==='price'){i.price=val;spPlant(i.name,val);}
  else i[field]=val;
  save();render();
}
function spPlant(name,price){
  if(!name||!name.trim())return;
  name=name.trim();
  const ex=S.savedPlants.find(p=>p.name===name);
  if(ex)ex.price=price;else S.savedPlants.push({name,price});
  save();
}
function addCM(){
  const n=(document.getElementById('ncn')||{}).value||'';
  const a=(document.getElementById('nca')||{}).value||'';
  const p=(document.getElementById('ncp')||{}).value||'';
  if(!n.trim()){toast('נא להזין שם');return;}
  S.customers.push({id:S.nextId++,name:n.trim(),address:a.trim(),phone:p.trim(),defaultFee:''});
  save();UI.modal=null;render();toast('לקוח נוסף ✓');
}
function addCI(){
  const n=(document.getElementById('ncn')||{}).value||'';
  const a=(document.getElementById('nca')||{}).value||'';
  const p=(document.getElementById('ncp')||{}).value||'';
  if(!n.trim()){toast('נא להזין שם');return;}
  S.customers.push({id:S.nextId++,name:n.trim(),address:a.trim(),phone:p.trim(),defaultFee:''});
  save();UI.addCust=false;render();toast('לקוח נוסף ✓');
}
function delC(id){S.customers=S.customers.filter(c=>c.id!==id);save();render();toast('לקוח הוסר');}

// ── BILLING ──
function showBill(cid,yr,mo){
  const cust=S.customers.find(c=>c.id===cid);
  const vs=vim(yr,mo).filter(v=>v.custId===cid).sort((a,b)=>a.date.localeCompare(b.date));
  UI.billData={cust,visits:vs,total:vs.reduce((s,v)=>s+vt(v),0),month:MN[mo],year:yr};
  UI.modal='bill';render();
}
function bText(){
  const {cust,visits,total,month,year}=UI.billData;
  const L=['חשבונית שירות גינון — '+month+' '+year,'לקוח: '+cust.name,'כתובת: '+cust.address,'─'.repeat(28)];
  visits.forEach(v=>{
    const[,mm,dd]=v.date.split('-').map(Number);
    const f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
    L.push('📅 '+dd+'/'+mm+': ₪'+vt(v).toFixed(2));
    if(v.notes)L.push('   '+v.notes);
    if(f1>0)L.push('   עלות ביקור 1: ₪'+f1.toFixed(2));
    if(f2>0)L.push('   עלות ביקור 2 + מע"מ 18%: ₪'+(f2*1.18).toFixed(2));
    (v.items||[]).forEach(i=>L.push('   • '+i.name+(i.size&&i.cat==='צמחים'?' ('+i.size+')':'')+' x'+i.qty+' @ ₪'+(parseFloat(i.price)||0)));
  });
  L.push('─'.repeat(28),'סה"כ לתשלום: ₪'+total.toFixed(2),'','תודה רבה! 🌿');
  return L.join('\n');
}
function copyBill(){navigator.clipboard.writeText(bText()).then(()=>toast('הועתק ✓')).catch(()=>toast('שגיאה'));}
function billWA(){window.open('https://wa.me/?text='+encodeURIComponent(bText()),'_blank');}

function allTxt(){
  const allV=vim(UI.yr,UI.mo);
  const byC=S.customers.map(c=>({c,vs:allV.filter(v=>v.custId===c.id)})).filter(x=>x.vs.length>0).map(x=>({...x,tot:x.vs.reduce((s,v)=>s+vt(v),0)}));
  const gr=byC.reduce((s,x)=>s+x.tot,0);
  const L=['סיכום חודשי — '+MN[UI.mo]+' '+UI.yr,'═'.repeat(30)];
  byC.forEach(({c,vs,tot})=>{
    L.push('','🏡 '+c.name);
    vs.forEach(v=>{
      const[,mm,dd]=v.date.split('-').map(Number);
      L.push('  • '+dd+'/'+mm+': ₪'+vt(v).toFixed(2));
      if(v.notes)L.push('    '+v.notes);
      (v.items||[]).forEach(i=>L.push('    - '+i.name+(i.size&&i.cat==='צמחים'?' ('+i.size+')':'')+' x'+i.qty));
    });
    L.push('  סה"כ: ₪'+tot.toFixed(2));
  });
  L.push('','═'.repeat(30),'סה"כ כולל: ₪'+gr.toFixed(2),byC.length+' לקוחות · '+allV.length+' ביקורים');
  return L.join('\n');
}
function copyAll(){navigator.clipboard.writeText(allTxt()).then(()=>toast('הועתק ✓')).catch(()=>toast('שגיאה'));}
function sendAll(){window.open('https://wa.me/?text='+encodeURIComponent(allTxt()),'_blank');}
function custWA(cid,yr,mo){
  const cust=S.customers.find(c=>c.id===cid);
  const vs=vim(yr,mo).filter(v=>v.custId===cid).sort((a,b)=>a.date.localeCompare(b.date));
  const tot=vs.reduce((s,v)=>s+vt(v),0);
  const L=['שלום '+cust.name+',','','סיכום ביקורים לחודש '+MN[mo]+' '+yr,''];
  vs.forEach(v=>{
    const[,mm,dd]=v.date.split('-').map(Number);
    L.push('📅 '+dd+'/'+mm+': ₪'+vt(v).toFixed(2));
    if(v.notes)L.push('   '+v.notes);
    (v.items||[]).forEach(i=>L.push('   • '+i.name+(i.size&&i.cat==='צמחים'?' ('+i.size+')':'')+' x'+i.qty));
  });
  L.push('','סה"כ לתשלום: ₪'+tot.toFixed(2),'','תודה רבה! 🌿');
  window.open('https://wa.me/?text='+encodeURIComponent(L.join('\n')),'_blank');
}

// ── AUTOCOMPLETE ──
function setupAC(){
  document.querySelectorAll('.pi').forEach(inp=>{
    inp.addEventListener('input',function(){
      const val=this.value,iid=this.dataset.iid;
      const sg=document.getElementById('sg-'+iid);
      if(!sg)return;
      const m=S.savedPlants.filter(p=>p.name.includes(val)&&val.length>0&&p.name!==val);
      if(!m.length){sg.classList.remove('show');return;}
      sg.innerHTML=m.map(p=>'<div class="si" data-n="'+e(p.name)+'" data-p="'+e(p.price||'')+'">'+e(p.name)+(p.price?' — ₪'+p.price:'')+'</div>').join('');
      sg.querySelectorAll('.si').forEach(el=>{
        el.addEventListener('mousedown',function(ev){
          ev.preventDefault();
          const ds=inp.dataset.ds,vid=inp.dataset.vid,iid2=inp.dataset.iid;
          const it=fi(ds,vid,iid2);
          if(it){it.name=this.dataset.n;it.price=this.dataset.p||it.price;save();render();}
        });
      });
      sg.classList.add('show');
    });
    inp.addEventListener('blur',function(){
      setTimeout(()=>{
        const sg=document.getElementById('sg-'+this.dataset.iid);
        if(sg)sg.classList.remove('show');
        const it=fi(this.dataset.ds,this.dataset.vid,this.dataset.iid);
        if(it&&this.value!==it.name){it.name=this.value;spPlant(this.value,it.price);save();}
      },150);
    });
  });
}

// ── BACKUP ──
function exportD(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='gardener-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('גיבוי הורד ✓');
}
function importD(ev){
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{const p=JSON.parse(e.target.result);if(p&&Array.isArray(p.customers)){S=p;save();render();toast('נתונים שוחזרו ✓');}else toast('קובץ לא תקין');}catch{toast('שגיאה בקריאת הקובץ');}};
  r.readAsText(file);ev.target.value='';
}

// ── SAVE STATUS ──
function showSaveStatus(){
  let el=document.getElementById('save-status');
  if(!el)return;
  const count=S.customers.length;
  const visits=Object.values(S.visits).flat().length;
  el.textContent='✓ נשמר | '+count+' לקוחות | '+visits+' ביקורים';
  el.style.color='#3a6b35';
}


// ── INSTALL PWA ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
window.addEventListener('appinstalled', function() {
  document.getElementById('install-banner').classList.remove('show');
  toast('האפליקציה הותקנה! ✓');
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.then(() => { deferredPrompt = null; });
    document.getElementById('install-banner').classList.remove('show');
  } else {
    // iOS Safari instructions
    toast('Safari: שתף ← "הוסף למסך הבית"');
  }
}
