function save(){
  try{
    const j=JSON.stringify(S);
    // שמור תמיד במפתח הקבוע (לעולם לא משתנה)
    localStorage.setItem('gardener_MASTER',j);
    localStorage.setItem('gardener_MASTER_bak',j);
  }catch(e){console.error('שגיאת שמירה:',e);}
}
function loadS(){
  // נסה לטעון מהמפתח הראשי
  const keys=['gardener_MASTER','gardener_MASTER_bak','gardener_v4','gardener_v4_bak',
               'gardener_v3','gardener_v3_bak','gardener_v2','gardener_v1'];
  for(const k of keys){
    try{
      const r=localStorage.getItem(k);
      if(r){
        const p=JSON.parse(r);
        if(p&&Array.isArray(p.customers)&&(p.customers.length>0||Object.keys(p.visits||{}).length>0)){
          S=p;
          // העבר מיד למפתח הקבוע
          localStorage.setItem('gardener_MASTER',r);
          localStorage.setItem('gardener_MASTER_bak',r);
          console.log('נטענו נתונים מ:',k,'| לקוחות:',p.customers.length);
          return;
        }
      }
    }catch(e){console.warn('שגיאה בטעינה מ:',k,e);}
  }
  console.log('לא נמצאו נתונים — מתחיל מחדש');
}
function exportD(){
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='gardener-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
  toast('גיבוי הורד ✓');
}
function importD(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{const p=JSON.parse(e.target.result);if(p&&Array.isArray(p.customers)){S=p;save();render();toast('נתונים שוחזרו ✓');}else toast('קובץ לא תקין');}catch{toast('שגיאה בקריאת הקובץ');}};
  r.readAsText(f);ev.target.value='';
}

function dim(y,m){return new Date(y,m+1,0).getDate();}
function fd1(y,m){return new Date(y,m,1).getDay();}
function fdate(s){const[y,m,d]=s.split('-').map(Number);return DY[new Date(y,m-1,d).getDay()]+' '+d+' '+MN[m-1]+' '+y;}
function hol(ds){return HL[ds]||null;}
function vt(v){
  const f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
  return f1+(f2*1.18)+(v.items||[]).reduce((s,it)=>s+(it.qty||0)*(parseFloat(it.price)||0),0);
}
function ni(){return {id:Date.now()+'_'+Math.random().toString(36).slice(2),cat:'צמחים',name:'',size:'כוסית',qty:1,price:''};}
function vim(y,m){
  const mk=y+'-'+String(m+1).padStart(2,'0');
  return Object.entries(S.visits).filter(([k])=>k.startsWith(mk)).flatMap(([k,vs])=>vs.map(v=>({...v,date:k})));
}
function allVisits(){return Object.entries(S.visits).flatMap(([k,vs])=>vs.map(v=>({...v,date:k})));}
function fv(ds,vid){return(S.visits[ds]||[]).find(v=>v.id===vid);}
function fi(ds,vid,iid){const v=fv(ds,vid);return v?(v.items||[]).find(i=>i.id===iid):null;}
// sort customers by visit frequency
function sortedCustomers(q){
  const counts={};
  Object.values(S.visits).flat().forEach(v=>{if(v.custId)counts[v.custId]=(counts[v.custId]||0)+1;});
  return S.customers
    .filter(c=>!q||c.name.includes(q)||c.address.includes(q)||c.phone.includes(q))
    .sort((a,b)=>(counts[b.id]||0)-(counts[a.id]||0));
}
// get last fee for a customer
function lastFee(custId){
  const vs=allVisits().filter(v=>v.custId===custId).sort((a,b)=>b.date.localeCompare(a.date));
  if(vs.length){return {fee:vs[0].fee||'',fee2:vs[0].fee2||''};}
  const c=S.customers.find(c=>c.id===custId);
  return {fee:c?.defaultFee||'',fee2:''};
}

function go(v){UI.view=v;UI.addCust=false;UI.custSearch='';render();}
function upTabs(){document.querySelectorAll('.tab').forEach(t=>{const m=t.getAttribute('onclick').match(/'([^']+)'/);t.classList.toggle('on',m&&m[1]===UI.view);});}
function render(){
  save();
  document.getElementById('main').innerHTML=rv();
  document.getElementById('modal-wrap').innerHTML=UI.modal?rm():'';
  upTabs();setupAC();
  const el=document.getElementById('save-status');
  if(el)el.textContent='✓ נשמר | '+S.customers.length+' לקוחות | '+Object.values(S.visits).flat().length+' ביקורים';
  if(UI.view==='stats')drawCharts();
}

function rCal(){
  const ts=new Date().toISOString().slice(0,10);
  let h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
  h+='<button class="btn bo bsm" onclick="prevM()">← הקודם</button>';
  h+='<div style="font-size:17px;font-weight:700;color:var(--g);">'+MN[UI.mo]+' '+UI.yr+'</div>';
  h+='<button class="btn bo bsm" onclick="nextM()">הבא →</button></div>';
  h+='<div class="legend"><span class="ldot" style="background:#c0392b;"></span>חג <span class="ldot" style="background:#2980b9;"></span>חופשה <span class="ldot" style="background:#7f8c8d;"></span>זיכרון</div>';
  h+='<div class="card" style="padding:10px;">';
  h+='<div class="cgrid" style="margin-bottom:3px;">';
  DY.forEach(d=>{h+='<div class="chdr">'+d+'</div>';});
  h+='</div><div class="cgrid">';
  const st=fd1(UI.yr,UI.mo);
  for(let i=0;i<st;i++)h+='<div></div>';
  for(let d=1;d<=dim(UI.yr,UI.mo);d++){
    const ds=dkey(UI.yr,UI.mo,d),vs=(S.visits[ds]||[]),hd=hol(ds),isT=ds===ts;
    let cls='dc';
    if(isT)cls+=' tod';
    else if(hd&&hd[1]==='h')cls+=' hh';
    else if(hd&&hd[1]==='v')cls+=' hv2';
    else if(hd&&hd[1]==='m')cls+=' hm';
    else if(vs.length)cls+=' hv';
    const hc=hd?(hd[1]==='h'?'#c0392b':hd[1]==='v'?'#2980b9':'#7f8c8d'):null;
    h+='<div class="'+cls+'" onclick="goDay(\''+ds+'\')">';
    h+='<div class="dc-n" style="color:'+(isT?'var(--g)':hc||'inherit')+';">'+(isT?'<b>'+d+'</b>':d)+'</div>';
    if(hd)h+='<div class="dc-h" style="color:'+hc+';">'+e(hd[0])+'</div>';
    // show up to 3 unique customer names
    const names=[...new Set(vs.map(v=>{
      if(v.walkin)return v.walkin.split(' ')[0];
      const c=S.customers.find(c=>c.id===v.custId);return c?c.name.split(' ')[0]:'?';
    }))];
    names.slice(0,3).forEach(n=>{h+='<div class="dc-c">'+e(n)+'</div>';});
    if(names.length>3)h+='<div style="font-size:7px;color:var(--mut);">+'+(names.length-3)+'</div>';
    h+='</div>';
  }
  h+='</div></div>';
  const mv=vim(UI.yr,UI.mo),rev=mv.reduce((s,v)=>s+vt(v),0);
  h+=mv.length>0
    ?'<div class="card" style="padding:8px 12px;margin-top:8px;font-size:13px;"><span style="color:var(--mut);">סיכום: </span><b>'+mv.length+'</b> ביקורים &nbsp;·&nbsp; <b style="color:var(--g);">₪'+rev.toFixed(2)+'</b> הכנסה</div>'
    :'<div class="card" style="padding:8px 12px;margin-top:8px;color:var(--mut);font-size:12px;">אין ביקורים החודש.</div>';
  return h;
}

function nextM(){if(UI.mo===11){UI.mo=0;UI.yr++;}else UI.mo++;render();}

function rVisit(v,ds){
  const isWalkin=!!v.walkin;
  const c=isWalkin?null:S.customers.find(c=>c.id===v.custId);
  const name=isWalkin?v.walkin:(c?c.name:'לקוח לא ידוע');
  const addr=c?c.address:'';
  const f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
  const f2v=f2*1.18;
  const it=(v.items||[]).reduce((s,i)=>s+(i.qty||0)*(parseFloat(i.price)||0),0);
  const tot=f1+f2v+it;
  let h='<div class="card vc">';
  h+='<div class="vh"><div>';
  h+='<div style="font-size:14px;font-weight:700;color:var(--g);">🏡 '+e(name)+(isWalkin?' <span style="font-size:10px;background:#e8d8f0;color:#6a3d8f;border-radius:4px;padding:1px 5px;">מזדמן</span>':'')+'</div>';
  if(addr)h+='<div style="font-size:11px;color:var(--mut);margin-top:1px;">📍 '+e(addr)+'</div>';
  h+='</div><button class="btn br bxs" onclick="delV(\''+ds+'\',\''+v.id+'\')">הסר</button></div>';
  // notes
  h+='<div style="margin-bottom:9px;"><span class="lbl">הערות עבודה</span>';
  h+='<textarea rows="2" placeholder="תאר את העבודה שבוצעה..." onchange="upNotes(\''+ds+'\',\''+v.id+'\',this.value)">'+e(v.notes||'')+'</textarea></div>';
  // fees
  h+='<div class="fr">';
  h+='<div class="fb"><span class="lbl">עלות ביקור 1 (₪)</span>';
  h+='<input type="number" min="0" step="1" placeholder="הכנס עלות..." value="'+e(v.fee===''||v.fee===undefined?'':v.fee)+'" onchange="upFee(\''+ds+'\',\''+v.id+'\',\'fee\',this.value,'+( v.custId||'null')+')">';
  if(!isWalkin)h+='<div style="font-size:10px;color:var(--mut);margin-top:2px;">💡 נשמר לביקור הבא</div>';
  h+='</div>';
  h+='<div class="fb"><span class="lbl">עלות ביקור 2 + מע״מ (₪)</span>';
  h+='<input type="number" min="0" step="1" placeholder="הכנס עלות..." value="'+e(v.fee2===''||v.fee2===undefined?'':v.fee2)+'" onchange="upFee(\''+ds+'\',\''+v.id+'\',\'fee2\',this.value,null)">';
  if(f2>0)h+='<div style="font-size:11px;color:var(--mut);margin-top:2px;">+ 18% מע״מ = ₪'+f2v.toFixed(2)+'</div>';
  h+='</div></div>';
  // items
  h+='<div style="margin-bottom:9px;"><span class="lbl">פריטים שנוספו</span>';
  (v.items||[]).forEach(item=>{h+=rItem(item,ds,v.id);});
  h+='<button class="btn bs bsm" style="margin-top:4px;" onclick="addI(\''+ds+'\',\''+v.id+'\')">+ הוסף פריט</button></div>';
  // subtotal
  h+='<div class="sub">';
  if(f1>0)h+='<div class="sr"><span>עלות ביקור 1</span><span>₪'+f1.toFixed(2)+'</span></div>';
  if(f2>0)h+='<div class="sr"><span>עלות ביקור 2 + מע״מ</span><span>₪'+f2v.toFixed(2)+'</span></div>';
  if(it>0)h+='<div class="sr"><span>פריטים</span><span>₪'+it.toFixed(2)+'</span></div>';
  h+='<div class="st"><span>סה״כ</span><span>₪'+tot.toFixed(2)+'</span></div>';
  h+='</div></div>';
  return h;
}

function rItem(item,ds,vid){
  let h='<div class="ir"><div class="ig">';
  let cats='';CT.forEach(c=>{cats+='<option'+(c===item.cat?' selected':'')+'>'+e(c)+'</option>';});
  h+='<select onchange="upCat(\''+ds+'\',\''+vid+'\',\''+item.id+'\',this.value)">'+cats+'</select>';
  if(item.cat==='צמחים'){
    h+='<div class="acw"><input type="text" class="pi" placeholder="שם הצמח..." value="'+e(item.name)+'" data-ds="'+ds+'" data-vid="'+vid+'" data-iid="'+item.id+'"><div class="sug" id="sg-'+item.id+'"></div></div>';
  }else if(item.cat==='דשן'){
    let fo='<option value="">בחר...</option>';FR.forEach(o=>{fo+='<option'+(o===item.name?' selected':'')+'>'+e(o)+'</option>';});
    h+='<select onchange="upIF(\''+ds+'\',\''+vid+'\',\''+item.id+'\',\'name\',this.value)">'+fo+'</select>';
  }else{
    h+='<input type="text" placeholder="'+(item.cat==='ריסוס'?'סוג ריסוס...':'תיאור...')+'" value="'+e(item.name)+'" onchange="upIF(\''+ds+'\',\''+vid+'\',\''+item.id+'\',\'name\',this.value)">';
  }
  h+='<input type="number" min="1" value="'+item.qty+'" style="text-align:center;" onchange="upIF(\''+ds+'\',\''+vid+'\',\''+item.id+'\',\'qty\',this.value)">';
  h+='<input type="number" min="0" step="0.01" value="'+e(item.price)+'" placeholder="₪" onchange="upIF(\''+ds+'\',\''+vid+'\',\''+item.id+'\',\'price\',this.value)">';
  h+='<button onclick="delI(\''+ds+'\',\''+vid+'\',\''+item.id+'\')" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:15px;padding:0;">✕</button>';
  h+='</div>';
  if(item.cat==='צמחים'){
    let so='';PS.forEach(s=>{so+='<option'+(s===item.size?' selected':'')+'>'+e(s)+'</option>';});
    h+='<div style="display:flex;gap:5px;align-items:center;margin-top:5px;"><span style="font-size:10px;color:var(--mut);font-weight:700;">גודל:</span><select style="width:106px;font-size:11px;" onchange="upIF(\''+ds+'\',\''+vid+'\',\''+item.id+'\',\'size\',this.value)">'+so+'</select></div>';
  }
  h+='</div>';
  return h;
}

// MONTHLY
// ══════════════════════════════════════════════
function rMon(){
  let h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
  h+='<button class="btn bo bsm" onclick="prevM()">← הקודם</button>';
  h+='<div style="font-size:17px;font-weight:700;color:var(--g);">'+MN[UI.mo]+' '+UI.yr+' — סיכום</div>';
  h+='<button class="btn bo bsm" onclick="nextM()">הבא →</button></div>';
  const allV=vim(UI.yr,UI.mo);
  // group by customer (including walk-ins)
  const custGroups=[];
  const seenCust=new Set();
  // real customers
  S.customers.forEach(c=>{
    const vs=allV.filter(v=>v.custId===c.id);
    if(vs.length){custGroups.push({name:c.name,id:c.id,vs,tot:vs.reduce((s,v)=>s+vt(v),0)});seenCust.add(c.id);}
  });
  // walk-ins grouped by name
  const walkins={};
  allV.filter(v=>v.walkin).forEach(v=>{(walkins[v.walkin]=walkins[v.walkin]||[]).push(v);});
  Object.entries(walkins).forEach(([nm,vs])=>{custGroups.push({name:nm,id:null,vs,tot:vs.reduce((s,v)=>s+vt(v),0)});});
  const gr=custGroups.reduce((s,x)=>s+x.tot,0);
  const totF1=allV.reduce((s,v)=>s+(parseFloat(v.fee)||0),0);
  const totF2=allV.reduce((s,v)=>s+(parseFloat(v.fee2)||0)*1.18,0);
  if(!custGroups.length){h+='<div class="card" style="padding:20px;text-align:center;color:var(--mut);">אין ביקורים החודש.</div>';return h;}
  custGroups.forEach(({name,id,vs,tot})=>{
    h+='<div class="card" style="margin-bottom:10px;padding:12px 15px;">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;">';
    h+='<div><div style="font-size:14px;font-weight:700;color:var(--g);">'+e(name)+(id===null?' <span style="font-size:10px;background:#e8d8f0;color:#6a3d8f;border-radius:4px;padding:1px 5px;">מזדמן</span>':'')+'</div>';
    h+='<div style="font-size:11px;color:var(--mut);">'+vs.length+' ביקורים</div></div>';
    h+='<div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;">';
    h+='<div style="font-weight:700;font-size:15px;color:var(--g);">₪'+tot.toFixed(2)+'</div>';
    h+='<button class="btn bg bsm" onclick="showBill(\''+e(name)+'\','+JSON.stringify(id)+','+UI.yr+','+UI.mo+')">📄 חשבונית</button>';
    h+='<button class="btn bw bsm" onclick="custWA(\''+e(name)+'\','+JSON.stringify(id)+','+UI.yr+','+UI.mo+')">💬 וואטסאפ</button>';
    h+='</div></div>';
    h+='<table class="bt"><thead><tr><th>תאריך</th><th>עלות 1</th><th>עלות 2+מע״מ</th><th>פריטים</th><th>סה״כ</th></tr></thead><tbody>';
    vs.sort((a,b)=>a.date.localeCompare(b.date)).forEach(v=>{
      const[,mm,dd]=v.date.split('-').map(Number);
      const f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
      const il=v.items&&v.items.length?v.items.map(i=>e(i.name)+'('+i.qty+')').join(', '):'—';
      h+='<tr><td>'+dd+'/'+mm+'</td><td>'+(f1?'₪'+f1.toFixed(2):'—')+'</td><td>'+(f2?'₪'+(f2*1.18).toFixed(2):'—')+'</td><td style="font-size:11px;">'+il+'</td><td style="font-weight:700;">₪'+vt(v).toFixed(2)+'</td></tr>';
    });
    h+='</tbody></table></div>';
  });
  // grand total bar
  h+='<div class="card" style="padding:12px 15px;background:var(--gbg);border:2px solid var(--g);">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:9px;">';
  h+='<div>';
  h+='<div style="font-size:12px;color:#5a5040;"><b>'+allV.length+'</b> ביקורים · <b>'+custGroups.length+'</b> לקוחות</div>';
  h+='<div style="font-size:11px;color:var(--mut);margin-top:2px;">עלות 1: ₪'+totF1.toFixed(2)+' | עלות 2+מע״מ: ₪'+totF2.toFixed(2)+'</div>';
  h+='<div style="font-weight:700;font-size:18px;color:var(--g);">סה״כ: ₪'+gr.toFixed(2)+'</div>';
  h+='</div>';
  h+='<div style="display:flex;gap:7px;flex-wrap:wrap;">';
  h+='<button class="btn bg" onclick="copyAll()">📋 העתק הכל</button>';
  h+='<button class="btn bw" onclick="sendAll()">💬 שלח הכל לוואטסאפ</button>';
  h+='</div></div></div>';
  return h;
}

// STATS
// ══════════════════════════════════════════════
function rStats(){
  const today=new Date();
  const todayStr=today.toISOString().slice(0,10);
  const av=allVisits();
  // daily = today
  const dayVis=av.filter(v=>v.date===todayStr);
  const dayRev=dayVis.reduce((s,v)=>s+vt(v),0);
  // week
  const weekStart=new Date(today);weekStart.setDate(today.getDate()-today.getDay());
  const weekStr=weekStart.toISOString().slice(0,10);
  const weekVis=av.filter(v=>v.date>=weekStr&&v.date<=todayStr);
  const weekRev=weekVis.reduce((s,v)=>s+vt(v),0);
  // month
  const monVis=vim(today.getFullYear(),today.getMonth());
  const monRev=monVis.reduce((s,v)=>s+vt(v),0);
  // year
  const yrPfx=String(today.getFullYear())+'-';
  const yrVis=av.filter(v=>v.date.startsWith(yrPfx));
  const yrRev=yrVis.reduce((s,v)=>s+vt(v),0);
  // fee1 vs fee2 breakdown (month)
  const mF1=monVis.reduce((s,v)=>s+(parseFloat(v.fee)||0),0);
  const mF2=monVis.reduce((s,v)=>s+(parseFloat(v.fee2)||0)*1.18,0);
  const mIt=monVis.reduce((s,v)=>s+(v.items||[]).reduce((ss,it)=>ss+(it.qty||0)*(parseFloat(it.price)||0),0),0);
  // top customers (all time)
  const custTotals={};
  av.forEach(v=>{
    const k=v.walkin||v.custId;
    if(!k)return;
    custTotals[k]=(custTotals[k]||{rev:0,cnt:0,name:'?'});
    custTotals[k].rev+=vt(v);
    custTotals[k].cnt++;
    if(!v.walkin){const c=S.customers.find(c=>c.id===v.custId);if(c)custTotals[k].name=c.name;}
    else custTotals[k].name=v.walkin+' (מזדמן)';
  });
  const topCusts=Object.values(custTotals).sort((a,b)=>b.rev-a.rev).slice(0,6);

  let h='<div style="font-size:18px;font-weight:700;color:var(--g);margin-bottom:12px;">📈 נתוני הכנסות</div>';
  // stat cards
  h+='<div class="stats-grid">';
  const cards=[
    ['היום','₪'+dayRev.toFixed(2),dayVis.length+' ביקורים'],
    ['השבוע','₪'+weekRev.toFixed(2),weekVis.length+' ביקורים'],
    [MN[today.getMonth()],'₪'+monRev.toFixed(2),monVis.length+' ביקורים'],
    [String(today.getFullYear()),'₪'+yrRev.toFixed(2),yrVis.length+' ביקורים'],
  ];
  cards.forEach(([lbl,num,sub])=>{
    h+='<div class="stat-card"><div class="stat-num">'+num+'</div><div class="stat-lbl">'+lbl+'</div><div class="stat-sub">'+sub+'</div></div>';
  });
  h+='</div>';
  // breakdown
  h+='<div class="chart-wrap"><div class="chart-title">פירוט הכנסות — '+MN[today.getMonth()]+' '+today.getFullYear()+'</div>';
  h+='<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:13px;">';
  h+='<div style="flex:1;min-width:120px;background:#f5fbf3;border:1px solid var(--bdr);border-radius:8px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:700;color:var(--g);">₪'+mF1.toFixed(2)+'</div><div style="color:var(--mut);font-size:11px;">עלות ביקור 1</div></div>';
  h+='<div style="flex:1;min-width:120px;background:#eaf4fb;border:1px solid var(--bdr);border-radius:8px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:700;color:#2980b9;">₪'+mF2.toFixed(2)+'</div><div style="color:var(--mut);font-size:11px;">עלות ביקור 2 + מע״מ</div></div>';
  h+='<div style="flex:1;min-width:120px;background:#fdf0f0;border:1px solid var(--bdr);border-radius:8px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:700;color:var(--red);">₪'+mIt.toFixed(2)+'</div><div style="color:var(--mut);font-size:11px;">פריטים</div></div>';
  h+='</div></div>';
  // monthly bar chart (last 6 months)
  h+='<div class="chart-wrap"><div class="chart-title">הכנסות — 6 חודשים אחרונים</div><canvas id="chart-mon" height="160"></canvas></div>';
  // top customers pie
  if(topCusts.length){
    h+='<div class="chart-wrap"><div class="chart-title">לקוחות מובילים (לפי הכנסה)</div><canvas id="chart-cust" height="180"></canvas></div>';
  }
  // daily chart (current month)
  h+='<div class="chart-wrap"><div class="chart-title">הכנסה יומית — '+MN[today.getMonth()]+' '+today.getFullYear()+'</div><canvas id="chart-day" height="150"></canvas></div>';
  return h;
}

function drawCharts(){
  if(typeof Chart==='undefined')return;
  const today=new Date();
  // ── 6-month bar chart ──
  const monLabels=[],monData=[];
  for(let i=5;i>=0;i--){
    const d=new Date(today.getFullYear(),today.getMonth()-i,1);
    const vs=vim(d.getFullYear(),d.getMonth());
    monLabels.push(MN[d.getMonth()].slice(0,3));
    monData.push(parseFloat(vs.reduce((s,v)=>s+vt(v),0).toFixed(2)));
  }
  buildChart('chart-mon','bar',monLabels,monData,'₪','#3a6b35');
  // ── top customers pie ──
  const custTotals={};
  allVisits().forEach(v=>{
    const k=v.walkin||String(v.custId);
    if(!k)return;
    const nm=v.walkin?v.walkin:(S.customers.find(c=>c.id===v.custId)?.name||'?');
    custTotals[nm]=(custTotals[nm]||0)+vt(v);
  });
  const top=Object.entries(custTotals).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if(top.length&&document.getElementById('chart-cust')){
    const colors=['#3a6b35','#7a9e72','#2980b9','#e67e22','#c0392b','#8e44ad'];
    destroyChart('chart-cust');
    new Chart(document.getElementById('chart-cust'),{
      type:'doughnut',
      data:{labels:top.map(t=>t[0]),datasets:[{data:top.map(t=>parseFloat(t[1].toFixed(2))),backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
      options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Heebo',size:11},boxWidth:12}}},cutout:'55%'}
    });
  }
  // ── daily chart ──
  const days=dim(today.getFullYear(),today.getMonth());
  const dayLabels=[],dayData=[];
  for(let d=1;d<=days;d++){
    const ds=dkey(today.getFullYear(),today.getMonth(),d);
    const vs=S.visits[ds]||[];
    dayLabels.push(String(d));
    dayData.push(parseFloat(vs.reduce((s,v)=>s+vt(v),0).toFixed(2)));
  }
  buildChart('chart-day','line',dayLabels,dayData,'₪','#2980b9');
}
const _charts={};
function destroyChart(id){if(_charts[id]){_charts[id].destroy();delete _charts[id];}}
function buildChart(id,type,labels,data,prefix,color){
  destroyChart(id);
  const el=document.getElementById(id);if(!el)return;
  _charts[id]=new Chart(el,{
    type,
    data:{labels,datasets:[{data,backgroundColor:type==='bar'?color+'99':color+'33',borderColor:color,borderWidth:2,fill:type==='line',tension:.35,pointRadius:3}]},
    options:{
      plugins:{legend:{display:false}},
      scales:{y:{ticks:{callback:v=>prefix+v,font:{family:'Heebo',size:10}},grid:{color:'#e8e0cc'}},x:{ticks:{font:{family:'Heebo',size:10}},grid:{display:false}}},
      interaction:{intersect:false,mode:'index'}
    }
  });
}

  const i=fi(ds,vid,iid);if(!i)return;

function waVisitLine(v){
  const[,mm,dd]=v.date.split('-').map(Number);
  const f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
  const lines=[];
  lines.push('📅 '+dd+'/'+mm+':');
  if(v.notes)lines.push('   '+v.notes);
  if(f1>0)lines.push('   עלות ביקור 1: ₪'+f1.toFixed(2));
  if(f2>0)lines.push('   עלות ביקור 2 + מע"מ: ₪'+(f2*1.18).toFixed(2));
  (v.items||[]).forEach(i=>{lines.push('   • '+i.name+(i.size&&i.cat==='צמחים'?' ('+i.size+')':'')+' × '+i.qty+(i.price?' @ ₪'+(parseFloat(i.price)||0):''));});
  lines.push('   סה"כ ביקור: ₪'+vt(v).toFixed(2));
  return lines.join('\n');
}

function custWA(name,id,yr,mo){
  const allV=vim(yr,mo);
  const vs=allV.filter(v=>id?v.custId===id:v.walkin===name).sort((a,b)=>a.date.localeCompare(b.date));
  const tot=vs.reduce((s,v)=>s+vt(v),0);
  const totF1=vs.reduce((s,v)=>s+(parseFloat(v.fee)||0),0);
  const totF2=vs.reduce((s,v)=>s+(parseFloat(v.fee2)||0)*1.18,0);
  const totIt=vs.reduce((s,v)=>s+(v.items||[]).reduce((ss,it)=>ss+(it.qty||0)*(parseFloat(it.price)||0),0),0);
  const L=['שלום '+name+',','','סיכום ביקורים לחודש '+MN[mo]+' '+yr+':','─'.repeat(30),''];
  vs.forEach(v=>{L.push(waVisitLine(v),'');});
  L.push('─'.repeat(30));
  L.push('סיכום חודש '+MN[mo]+':');
  if(totF1>0)L.push('  עלות ביקורים 1: ₪'+totF1.toFixed(2));
  if(totF2>0)L.push('  עלות ביקורים 2 + מע"מ: ₪'+totF2.toFixed(2));
  if(totIt>0)L.push('  פריטים ותוספות: ₪'+totIt.toFixed(2));
  L.push('','סה"כ לתשלום: ₪'+tot.toFixed(2),'','תודה רבה! 🌿');
  window.open('https://wa.me/?text='+encodeURIComponent(L.join('\n')),'_blank');
}

function bText(){
  const{name,visits,total,month,year}=UI.billData;
  const L=['חשבונית שירות גינון — '+month+' '+year,'לקוח: '+name,'─'.repeat(28)];
  visits.forEach(v=>{L.push(waVisitLine(v),'');});
  L.push('─'.repeat(28),'סה"כ לתשלום: ₪'+total.toFixed(2),'','תודה רבה! 🌿');
  return L.join('\n');
}
function copyBill(){navigator.clipboard.writeText(bText()).then(()=>toast('הועתק ✓')).catch(()=>toast('שגיאה'));}
function billWA(){window.open('https://wa.me/?text='+encodeURIComponent(bText()),'_blank');}

function allTxt(){
  const allV=vim(UI.yr,UI.mo);
  const custGroups=[];
  S.customers.forEach(c=>{const vs=allV.filter(v=>v.custId===c.id);if(vs.length)custGroups.push({name:c.name,vs});});
  const walkins={};
  allV.filter(v=>v.walkin).forEach(v=>{(walkins[v.walkin]=walkins[v.walkin]||[]).push(v);});
  Object.entries(walkins).forEach(([nm,vs])=>custGroups.push({name:nm+' (מזדמן)',vs}));
  const gr=allV.reduce((s,v)=>s+vt(v),0);
  const L=['סיכום חודשי — '+MN[UI.mo]+' '+UI.yr,'═'.repeat(32)];
  custGroups.forEach(({name,vs})=>{
    L.push('','🏡 '+name);
    vs.sort((a,b)=>a.date.localeCompare(b.date)).forEach(v=>{L.push(waVisitLine(v),'');});
    L.push('סה"כ: ₪'+vs.reduce((s,v)=>s+vt(v),0).toFixed(2));
  });
  L.push('','═'.repeat(32),'סה"כ כולל: ₪'+gr.toFixed(2),'');
  return L.join('\n');
}
function copyAll(){navigator.clipboard.writeText(allTxt()).then(()=>toast('הועתק ✓')).catch(()=>toast('שגיאה'));}
function sendAll(){window.open('https://wa.me/?text='+encodeURIComponent(allTxt()),'_blank');}

function setupAC(){
  document.querySelectorAll('.pi').forEach(inp=>{
    inp.addEventListener('input',function(){
      const val=this.value,iid=this.dataset.iid;
      const sg=document.getElementById('sg-'+iid);if(!sg)return;
      const m=S.savedPlants.filter(p=>p.name.includes(val)&&val.length>0&&p.name!==val);
      if(!m.length){sg.classList.remove('show');return;}
      sg.innerHTML=m.map(p=>'<div class="si" data-n="'+e(p.name)+'" data-p="'+e(p.price||'')+'">'+e(p.name)+(p.price?' — ₪'+p.price:'')+'</div>').join('');
      sg.querySelectorAll('.si').forEach(el=>{
        el.addEventListener('mousedown',function(ev){
          ev.preventDefault();
          const it=fi(inp.dataset.ds,inp.dataset.vid,inp.dataset.iid);
          if(it){it.name=this.dataset.n;it.price=this.dataset.p||it.price;save();render();}
        });
      });
      sg.classList.add('show');
    });
    inp.addEventListener('blur',function(){
      setTimeout(()=>{
        const sg=document.getElementById('sg-'+this.dataset.iid);
        if(sg)sg.classList.remove('show');
        const it=fi(this.dataset.ds,this.dataset.vid,this.dataset.iid);
        if(it&&this.value!==it.name){it.name=this.value;spPlant(this.value,it.price);save();}
      },150);
    });
  });
}
