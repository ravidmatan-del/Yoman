<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Heebo",Arial,sans-serif;background:var(--sand);color:#2c2c1e;min-height:100vh}
.btn{display:inline-flex;align-items:center;cursor:pointer;border:none;border-radius:7px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:700;transition:all .15s;white-space:nowrap;gap:4px}
.bg{background:var(--g);color:#fff}.bg:hover{background:var(--gd)}
.bs{background:var(--gl);color:#fff}
.bo{background:transparent;color:var(--g);border:1.5px solid var(--g)}.bo:hover{background:var(--g);color:#fff}
.br{background:var(--rbg);color:var(--red);border:1px solid #e0c8b8}
.bw{background:var(--wa);color:#fff}
.bsm{padding:5px 10px;font-size:12px}.bxs{padding:3px 8px;font-size:11px;border-radius:5px}
.card{background:var(--cream);border:1px solid var(--bdr);border-radius:10px;box-shadow:0 2px 8px rgba(60,50,20,.08)}
input,textarea,select{font-family:inherit;border:1.5px solid #c9c0a0;border-radius:7px;padding:8px 10px;font-size:16px;background:#fff;color:#2c2c1e;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--g)}
textarea{resize:vertical}
.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
#hdr{background:linear-gradient(135deg,#2e5228,#3a6b35,#4a8040);padding:14px 16px 0;position:sticky;top:0;z-index:40}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-t{color:#fff;font-size:15px;font-weight:800}
.logo-s{color:#a8d4a0;font-size:10px;margin-top:1px}
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;cursor:pointer;padding:9px 12px;border-radius:8px 8px 0 0;font-weight:700;font-size:12px;border:none;background:transparent;color:rgba(255,255,255,.7);font-family:inherit}
.tab.on{background:rgba(0,0,0,.25);color:#fff}
.tab:hover:not(.on){background:rgba(255,255,255,.15);color:#fff}
#main{padding:14px;max-width:860px;margin:0 auto}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.chdr{text-align:center;font-size:10px;font-weight:700;color:var(--mut);padding:3px 0}
.dc{cursor:pointer;border-radius:7px;padding:4px 3px;min-height:66px;border:1.5px solid transparent;background:var(--cream);overflow:hidden}
.dc:hover{background:#e8f0e4;border-color:#a8c89e}
.dc.tod{border-color:var(--g)!important;background:var(--gbg)}
.dc.hag{border-color:#e8b4b4;background:#fdf0f0}
.dc.chof{border-color:#b4cce8;background:#eaf4fb}
.dc.zik{border-color:#c8c8c8;background:#f2f3f4}
.dc.vist{background:#f0f5ee}
.dc-n{font-size:12px;font-weight:500;margin-bottom:2px}
.dc-h{font-size:7px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:1px}
.dc-c{font-size:7px;background:var(--g);color:#fff;border-radius:3px;padding:1px 3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.vc{margin-bottom:13px;padding:14px 15px}
.fr{display:flex;gap:9px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
.fb{min-width:125px;flex:1}
.ir{background:#f8f5ef;border-radius:7px;padding:8px;margin-bottom:6px;border:1px solid #e0d8c0}
.ig{display:grid;grid-template-columns:84px 1fr 46px 62px 24px;gap:5px;align-items:center}
.ig input,.ig select{font-size:13px;padding:6px 7px}
.acw{position:relative}
.sug{position:absolute;top:100%;right:0;left:0;background:#fff;border:1.5px solid var(--g);border-top:none;border-radius:0 0 7px 7px;z-index:50;max-height:120px;overflow-y:auto;display:none}
.sug.open{display:block}
.si{padding:7px 10px;cursor:pointer;font-size:13px}.si:hover{background:var(--gbg)}
.sub{border-top:2px solid var(--bdr);padding-top:9px;margin-top:6px}
.sr{display:flex;justify-content:space-between;font-size:13px;color:#5a5040;margin-bottom:3px;max-width:240px}
.st{display:flex;justify-content:space-between;font-weight:700;font-size:15px;color:var(--g);border-top:1px solid #c0b898;padding-top:4px;margin-top:2px;max-width:240px}
.bt{width:100%;border-collapse:collapse;font-size:12px}
.bt th{background:var(--g);color:#fff;padding:7px 9px;text-align:right;font-weight:700}
.bt td{padding:5px 9px;border-bottom:1px solid #e0d8c0;vertical-align:top}
.bt tr:last-child td{border-bottom:none}
.ov{position:fixed;inset:0;background:rgba(10,10,5,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:var(--cream);border-radius:14px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 24px 60px rgba(0,0,0,.3);padding:22px}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--g);color:#fff;padding:9px 22px;border-radius:30px;font-weight:700;font-size:13px;z-index:999;display:none}
.ic{background:#f0f5ee;border-radius:8px;padding:11px;margin-top:7px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
#bbar{border-top:1px solid var(--bdr);padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;background:var(--cream)}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:480px){.sg{grid-template-columns:repeat(4,1fr)}}
.sc{background:var(--cream);border:1px solid var(--bdr);border-radius:10px;padding:13px 15px}
.sn{font-size:21px;font-weight:800;color:var(--g)}
.sl{font-size:11px;color:var(--mut);margin-top:2px;font-weight:600}
.ss2{font-size:11px;color:var(--mut);margin-top:2px}
.cw{background:var(--cream);border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:14px}
.ct{font-size:13px;font-weight:700;margin-bottom:10px}
.wt{font-size:10px;background:#e8d8f0;color:#6a3d8f;border-radius:4px;padding:1px 5px;margin-right:4px}
@media print{#hdr,.tab,#bbar,.np{display:none!important}}
@media(max-width:480px){
  .logo-t{font-size:13px}#main{padding:10px}.modal{padding:15px}
  .ig{grid-template-columns:76px 1fr 42px 54px 20px;gap:3px}.ig input,.ig select{font-size:12px;padding:5px 6px}
  .two{grid-template-columns:1fr}.sr,.st{max-width:100%}.bt{font-size:11px}
}

var S={customers:[],visits:{},plants:[],payments:{},nextId:1};
var V={tab:"calendar",yr:new Date().getFullYear(),mo:new Date().getMonth(),
       day:new Date().toISOString().slice(0,10),modal:null,addCust:false,
       custQ:"",editId:null,billData:null};

function xe(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmt(n){
  if(isNaN(n)||n===undefined||n===null)return "0.00";
  return Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
}
function pad(n){return n<10?"0"+n:""+n}
function dkey(y,m,d){return y+"-"+pad(m+1)+"-"+pad(d)}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function fd1(y,m){return new Date(y,m,1).getDay()}
function fdate(s){var a=s.split("-").map(Number);return DW[new Date(a[0],a[1]-1,a[2]).getDay()]+" "+a[2]+" "+MN[a[1]-1]+" "+a[0]}
function vt(v){
  var f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
  return f1+f2*1.18+(v.items||[]).reduce(function(s,it){return s+(it.qty||0)*(parseFloat(it.price)||0)},0);
}
function vim(y,m){
  var mk=y+"-"+pad(m+1),out=[];
  Object.keys(S.visits).forEach(function(k){
    if(k.indexOf(mk)===0)S.visits[k].forEach(function(v){out.push(Object.assign({},v,{date:k}))});
  });
  return out;
}
function avAll(){
  var out=[];
  Object.keys(S.visits).forEach(function(k){
    S.visits[k].forEach(function(v){out.push(Object.assign({},v,{date:k}))});
  });
  return out;
}
function fv(ds,vid){return(S.visits[ds]||[]).find(function(v){return v.id===vid})}
function fi(ds,vid,iid){var v=fv(ds,vid);return v?(v.items||[]).find(function(i){return i.id===iid}):null}
function lastFee(cid){
  var vs=avAll().filter(function(v){return v.custId===cid}).sort(function(a,b){return b.date.localeCompare(a.date)});
  if(vs.length)return{fee:vs[0].fee!==undefined?vs[0].fee:"",fee2:vs[0].fee2!==undefined?vs[0].fee2:""};
  var c=S.customers.find(function(c){return c.id===cid});
  return{fee:c&&c.defaultFee!==undefined?c.defaultFee:"",fee2:""};
}
function sortC(q){
  var cnt={};avAll().forEach(function(v){if(v.custId)cnt[v.custId]=(cnt[v.custId]||0)+1});
  return S.customers
    .filter(function(c){return !q||c.name.indexOf(q)>=0||c.address.indexOf(q)>=0||c.phone.indexOf(q)>=0})
    .sort(function(a,b){return(cnt[b.id]||0)-(cnt[a.id]||0)});
}

function showSmartBeeMod(){
  V.modal="smartbee";

function rSmartBeeMod(){
  var b=V.billData;
  if(!b)return "";
  var f1tot=0,f2tot=0,itTot=0;
  b.visits.forEach(function(v){
    f1tot+=parseFloat(v.fee)||0;
    f2tot+=parseFloat(v.fee2)||0;
    (v.items||[]).forEach(function(it){itTot+=(it.qty||0)*(parseFloat(it.price)||0)});
  });
  var vat=f2tot*0.18;
  var h='<div class="ov" data-action="closeOv"><div class="modal" style="max-width:420px">';
  h+='<b style="font-size:15px;color:var(--g);display:block;margin-bottom:4px">&#128203; סיכום לחשבון עסקה</b>';

  if(f2tot>0){
    h+='<div style="display:flex;justify-content:space-between"><span>שירותי גינון '+b.month+" "+b.year+"</span><span><b>&#x20aa;"+fmt(f2tot)+"</b></span></div>";

  }
  if(itTot>0)h+='<div style="display:flex;justify-content:space-between"><span>צמחים וחומרים</span><span><b>&#x20aa;'+fmt(itTot)+'</b></span></div>';
  if(f1tot>0)h+='<div style="display:flex;justify-content:space-between"><span>עלות עבודה</span><span><b>&#x20aa;'+fmt(f1tot)+'</b></span></div>';

  h+="</div>";
  h+='<div style="display:flex;gap:8px;margin-top:14px">';
  h+='<button class="btn bg" data-action="copySmartBee">&#128203; העתק</button>';
  h+='<button class="btn bo" data-action="closeMod">סגור</button>';
  h+="</div></div></div>";
  return h;
}

function copySmartBee(){
  var b=V.billData;if(!b)return;
  var f1tot=0,f2tot=0,itTot=0;
  b.visits.forEach(function(v){
    f1tot+=parseFloat(v.fee)||0;
    f2tot+=parseFloat(v.fee2)||0;
    (v.items||[]).forEach(function(it){itTot+=(it.qty||0)*(parseFloat(it.price)||0)});
  });
  var lines=[];
  if(f2tot>0)lines.push("שירותי גינון "+b.month+" "+b.year+": ₪"+fmt(f2tot)+" (+ מעוִם ₪"+fmt(f2tot*0.18)+")");
  if(itTot>0)lines.push("צמחים וחומרים: ₪"+fmt(itTot));
  if(f1tot>0)lines.push("עלות עבודה: ₪"+fmt(f1tot));
    lines.push("\u05e1\u05d4\u0022\u05db \u05db\u05d5\u05dc\u05dc \u05de\u05e2\u0022\u05dd: \u20aa"+fmt(f1tot+f2tot*1.18+itTot));
  navigator.clipboard.writeText(lines.join("\n"))
    .then(function(){toast("הועתק ✓")})
    .catch(function(){toast("שגיאה")});
}

function exportBillXls(){
  var b=V.billData;
  if(!b||typeof XLSX==="undefined"){toast("טוען...");return}
  var wb=XLSX.utils.book_new();
  var rows=[];

  // Header info
  rows.push(["חשבון חודש "+b.month+" "+b.year]);
  rows.push(["לכבוד: "+b.name]);

  rows.push(["תאריך","תיאור","קטגוריה","כמות","מחיר יחידה","סה\"כ שורה"]);

  var f1tot=0,f2tot=0,itTot=0;
  b.visits.forEach(function(v){
    var p=v.date.split("-").map(Number);
    var dateStr=p[2]+"/"+p[1]+"/"+p[0];
    var f2=parseFloat(v.fee2)||0;
    f1tot+=parseFloat(v.fee)||0;
    f2tot+=f2;
    if(f2>0){
      rows.push([dateStr, v.notes||"ביקור", "ביקור", 1, f2, f2]);
    }
    (v.items||[]).forEach(function(it){
      var price=parseFloat(it.price)||0;
      var total=price*it.qty;
      itTot+=total;
      rows.push([dateStr,
        it.name+(it.size&&it.cat==="צמחים"?" ("+it.size+")":""),
        it.cat, it.qty, price, total]);
    });
  });

  rows.push([]);
  rows.push(["סיכום"]);
  if(f2tot>0)rows.push(["","עלות ביקורים (לפני מע\"מ)","","","",f2tot]);
  if(itTot>0)rows.push(["","צמחים/חומרים","","","",itTot]);
  if(f2tot>0)rows.push(["","מע\"מ 18% (על ביקורים)","","","",parseFloat((f2tot*0.18).toFixed(2))]);
  if(f1tot>0)rows.push(["","עלות עבודה","","","",f1tot]);
  rows.push(["","סה\"כ לתשלום","","","",parseFloat((f1tot+f2tot*1.18+itTot).toFixed(2))]);

  var ws=XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws["!cols"]=[{wch:12},{wch:30},{wch:14},{wch:8},{wch:14},{wch:14}];

  // Style total row bold (limited in xlsx.js without pro)
  XLSX.utils.book_append_sheet(wb,ws,"חשבון");
  var fname="חשבון-"+b.name+"-"+b.month+"-"+b.year+".xlsx";
  XLSX.writeFile(wb,fname);
  toast("אקסל הורד ✓");
}

function save(){
  try{var j=JSON.stringify(S);localStorage.setItem(SK,j);localStorage.setItem(SK+"_b",j)}catch(e){}
  _saveCount++;
  // Sync to cloud every 5 local saves

function loadData(){
  var keys=[SK,SK+"_b","gardener_MASTER","gardener_MASTER_bak","gardener_v4","gardener_v3"];
  for(var i=0;i<keys.length;i++){
    try{
      var r=localStorage.getItem(keys[i]);
      if(r){var p=JSON.parse(r);if(p&&Array.isArray(p.customers)){S=p;if(!S.plants)S.plants=[];save();return}}

function exportD(){
  var json=JSON.stringify(S,null,2);
  var fname="ginnun-"+new Date().toISOString().slice(0,10)+".json";
  var blob=new Blob([json],{type:"application/json"});
  // Try Web Share API first (Android - allows saving to Drive/WhatsApp/etc)
  if(navigator.share&&navigator.canShare){
    var file=new File([blob],fname,{type:"application/json"});
    if(navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:"גיבוי יומן גינון"})
        .then(function(){toast("\u05e9\u05d5\u05ea\u05e3 \u2713")})
        .catch(function(e){if(e.name!=="AbortError")dlFallback(blob,fname)});
      return;
    }
  }
  dlFallback(blob,fname);
}
function dlFallback(blob,fname){
  var u=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=u;a.download=fname;a.style.display="none";
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u)},1000);
  toast("\u05d2\u05d9\u05d1\u05d5\u05d9 \u05d4\u05d5\u05e8\u05d3 \u2713");
}
function importD(ev){
  var f=ev.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    try{var p=JSON.parse(e.target.result);if(p&&Array.isArray(p.customers)){S=p;if(!S.plants)S.plants=[];save();render();toast("שוחזר \u2713")}}
    catch(x){toast("שגיאה")}
  };
  r.readAsText(f);ev.target.value="";
}

function vLine(v){
  var p=v.date.split("-").map(Number),f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0,L=[];
  L.push("\uD83D\uDCC5 "+p[2]+"/"+p[1]+":");
  if(v.notes)L.push("   "+v.notes);
  if(f1>0)L.push("   \u05E2\u05DC\u05D5\u05EA \u05D1\u05D9\u05E7\u05D5\u05E8 1: \u20AA"+f1.toFixed(2));
  if(f2>0)L.push("   \u05E2\u05DC\u05D5\u05EA \u05D1\u05D9\u05E7\u05D5\u05E8 2+\u05DE\u05E2\u05D5\u05B4\u05DE: \u20AA"+(f2*1.18).toFixed(2));
  (v.items||[]).forEach(function(i){L.push("   \u2022 "+i.name+(i.size&&i.cat==="\u05E6\u05DE\u05D7\u05D9\u05DD"?" ("+i.size+")":"")+" x "+i.qty+(i.price?" @ \u20AA"+(parseFloat(i.price)||0):""))});
  L.push("   סה\"כ: \u20AA"+fmt(vt(v)));
  return L.join("\n");
}
function showBill(el){
  var d=el.dataset,name=d.nm,id=d.id==="null"?null:+d.id,yr=+d.yr,mo=+d.mo;
  var allV=vim(yr,mo),vs=allV.filter(function(v){return id!==null?v.custId===id:v.walkin===name}).sort(function(a,b){return a.date.localeCompare(b.date)});
  V.billData={name:name,id:id,addr:d.addr||"",phone:d.phone||"",visits:vs,total:vs.reduce(function(s,v){return s+vt(v)},0),month:MN[mo],year:yr};
  openMod("bill");
}
function billTxt(){
  var b=V.billData;
  if(!b)return "";
  var L=[];
  L.push("חשבון חודש "+b.month+" "+b.year);
  L.push("לכבוד: "+b.name);
  if(b.addr)L.push("כתובת: "+b.addr);
  if(b.phone)L.push("טלפון: "+b.phone);
  L.push("────────────────────────");
  var f1tot=0,f2tot=0,itTot=0;
  b.visits.forEach(function(v){
    var p=v.date.split("-").map(Number);
    var f2=parseFloat(v.fee2)||0;
    f1tot+=parseFloat(v.fee)||0;
    f2tot+=f2;
    var itV=(v.items||[]).reduce(function(s,i){return s+(i.qty||0)*(parseFloat(i.price)||0)},0);
    itTot+=itV;
    L.push(p[2]+"/"+p[1]+":");
    if(v.notes)L.push("  "+v.notes);
    if(f2>0)L.push("  ביקור: ₪"+fmt(f2));
    // Group items by category
    var cats={};
    (v.items||[]).forEach(function(i){
      var cat=i.cat||"אחר";
      if(!cats[cat])cats[cat]=[];
      cats[cat].push(i);
    });
    Object.keys(cats).forEach(function(cat){
      L.push("*"+cat+"*");
      cats[cat].forEach(function(i){
        L.push("  • "+i.name+(i.size&&i.cat==="צמחים"?" ("+i.size+")":"")+" × "+i.qty+(i.price?": ₪"+fmt((parseFloat(i.price)||0)*i.qty):""));
      });
    });
    L.push("  סה\"כ: ₪"+fmt(f2+itV));
    L.push("");
  });
  L.push("────────────────────────");
  if(f2tot>0)L.push("עלות ביקורים (לפני מע\"מ): ₪"+fmt(f2tot));
  if(f2tot>0)L.push("מע\"מ 18% (על ביקורים): ₪"+fmt(f2tot*0.18));
  if(itTot>0)L.push("צמחים/חומרים: ₪"+fmt(itTot));
  L.push("*סה\"כ כולל מע\"מ: ₪"+fmt(f2tot*1.18+itTot)+"*");
  if(f1tot>0)L.push("*עלות עבודה: ₪"+fmt(f1tot)+"*");
  L.push("","תודה רבה 🌿");
  return L.join("\n");
}

// ─── CLOUD SYNC (Firebase Realtime DB) ────────────────────────
var SYNC_KEY = "gv5_sync";
var _syncCfg = null;
var _syncTimer = null;
var _lastSync = null;
var _syncing = false;

function loadSyncCfg(){
  try{
    var r = localStorage.getItem(SYNC_KEY);
    if(r) _syncCfg = JSON.parse(r);
  }catch(e){}
}

function saveSyncCfg(){
  var url = (document.getElementById("fbUrl")||{}).value||"";
  var key = (document.getElementById("fbKey")||{}).value||"";
  url = url.trim().replace(/\/+$/,"");
  key = key.trim().replace(/[^a-zA-Z0-9_-]/g,"");
  if(!url||!key){toast("נא למלא את שני השדות");return}
  if(url.indexOf("firebaseio.com")<0){toast("כתובת לא תקינה — צריך להכיל firebaseio.com");return}
  _syncCfg = {url:url, key:key};
  localStorage.setItem(SYNC_KEY, JSON.stringify(_syncCfg));
  closeMod();
  toast("הגדרות נשמרו — מסנכרן...");
  cloudSync(true);
  startSyncTimer();
}

function clearSyncCfg(){
  _syncCfg = null;
  localStorage.removeItem(SYNC_KEY);
  if(_syncTimer){clearInterval(_syncTimer);_syncTimer=null;}
  setSyncStatus("","");
  closeMod();
  toast("הסנכרון בוטל");
}

function getSyncUrl(){
  if(!_syncCfg)return null;
  return _syncCfg.url+"/users/"+_syncCfg.key+"/data.json";
}

function setSyncStatus(icon, msg){
  var el = document.getElementById("syncStatus");
  if(el) el.textContent = icon ? (icon+" "+msg) : msg;
  var btn = document.getElementById("syncBtn");
  if(btn) btn.innerHTML = "&#9729;&#65039; " + (icon||"סנכרון");
}

function cloudSync(showToast){
  if(!_syncCfg||_syncing)return;
  _syncing = true;
  setSyncStatus("&#8593;","שולח...");
  var url = getSyncUrl();
  fetch(url,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(S)
  })
  .then(function(r){
    if(!r.ok)throw new Error("HTTP "+r.status);
    return r.json();
  })
  .then(function(){
    _syncing=false;
    _lastSync=new Date();
    var t=_lastSync.getHours()+":"+("0"+_lastSync.getMinutes()).slice(-2);
    setSyncStatus("&#9989;",t);
    if(showToast)toast("סונכרן \u2713 "+t);
  })
  .catch(function(e){
    _syncing=false;
    setSyncStatus("&#10060;","שגיאה");
    if(showToast)toast("שגיאת סנכרון: "+e.message);
    console.error("sync error",e);
  });
}

function cloudLoad(cb){
  if(!_syncCfg){cb&&cb(false);return;}
  setSyncStatus("&#8595;","טוען...");
  var url = getSyncUrl();
  fetch(url)
  .then(function(r){return r.json()})
  .then(function(data){
    if(data&&Array.isArray(data.customers)){
      S=data;
      if(!S.plants)S.plants=[];
      save();
      setSyncStatus("&#9989;","טעון");
      cb&&cb(true);
    }else{
      // No remote data yet — upload local
      setSyncStatus("&#9733;","חדש");
      cloudSync(false);
      cb&&cb(false);
    }
  })
  .catch(function(e){
    setSyncStatus("&#10060;","שגיאה");
    console.error("cloud load error",e);
    cb&&cb(false);
  });
}

function startSyncTimer(){
  if(_syncTimer)clearInterval(_syncTimer);
  if(!_syncCfg)return;
  // Auto-sync every 2 minutes
  _syncTimer = setInterval(function(){cloudSync(false)},120000);
}
