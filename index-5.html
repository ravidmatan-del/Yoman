<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="גינון רביד">
<meta name="theme-color" content="#3a6b35">
<title>יומן מתן רביד גינון והשקיה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--g:#3a6b35;--gd:#2e5228;--gl:#7a9e72;--gbg:#eef6eb;--cream:#fffdf7;--sand:#f5f0e8;--bdr:#d9d0b8;--mut:#7a6e55;--red:#b5673d;--rbg:#f5e8e0;--wa:#25D366;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',Arial,sans-serif;background:var(--sand);color:#2c2c1e;min-height:100vh;}
/* buttons */
.btn{display:inline-flex;align-items:center;cursor:pointer;border:none;border-radius:7px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:700;transition:all .15s;white-space:nowrap;gap:4px;}
.bg{background:var(--g);color:#fff;} .bg:hover{background:var(--gd);}
.bs{background:var(--gl);color:#fff;} .bs:hover{background:#5e7e56;}
.bo{background:transparent;color:var(--g);border:1.5px solid var(--g);} .bo:hover{background:var(--g);color:#fff;}
.br{background:var(--rbg);color:var(--red);border:1px solid #e0c8b8;}
.bw{background:var(--wa);color:#fff;} .bw:hover{background:#1da851;}
.bsm{padding:5px 10px;font-size:12px;} .bxs{padding:3px 8px;font-size:11px;border-radius:5px;}
/* card & inputs */
.card{background:var(--cream);border:1px solid var(--bdr);border-radius:10px;box-shadow:0 2px 8px rgba(60,50,20,.08);}
input,textarea,select{font-family:inherit;border:1.5px solid #c9c0a0;border-radius:7px;padding:8px 10px;font-size:16px;background:#fff;color:#2c2c1e;width:100%;outline:none;}
input:focus,textarea:focus,select:focus{border-color:var(--g);}
textarea{resize:vertical;}
.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--mut);margin-bottom:5px;}
/* header */
#hdr{background:linear-gradient(135deg,#2e5228,#3a6b35,#4a8040);padding:14px 16px 0;box-shadow:0 4px 20px rgba(30,50,20,.25);position:sticky;top:0;z-index:40;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.logo-t{color:#fff;font-size:15px;font-weight:800;line-height:1.2;}
.logo-s{color:#a8d4a0;font-size:10px;margin-top:1px;}
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;cursor:pointer;padding:9px 12px;border-radius:8px 8px 0 0;font-weight:700;font-size:12px;border:none;background:transparent;color:rgba(255,255,255,.7);font-family:inherit;}
.tab.on{background:rgba(0,0,0,.25);color:#fff;}
.tab:hover:not(.on){background:rgba(255,255,255,.15);color:#fff;}
/* main */
#main{padding:14px;max-width:860px;margin:0 auto;}
/* calendar */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.chdr{text-align:center;font-size:10px;font-weight:700;color:var(--mut);padding:3px 0;}
.dc{cursor:pointer;border-radius:7px;padding:4px 3px;min-height:66px;border:1.5px solid transparent;background:var(--cream);overflow:hidden;}
.dc:hover{background:#e8f0e4;border-color:#a8c89e;}
.dc.tod{border-color:var(--g)!important;background:var(--gbg);}
.dc.hag{border-color:#e8b4b4;background:#fdf0f0;}
.dc.chof{border-color:#b4cce8;background:#eaf4fb;}
.dc.zik{border-color:#c8c8c8;background:#f2f3f4;}
.dc.vist{background:#f0f5ee;}
.dc-num{font-size:12px;font-weight:500;margin-bottom:2px;}
.dc-hol{font-size:7px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:1px;}
.dc-nam{font-size:7px;background:var(--g);color:#fff;border-radius:3px;padding:1px 3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
/* visit */
.vc{margin-bottom:13px;padding:14px 15px;}
.fr{display:flex;gap:9px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px;}
.fb{min-width:125px;flex:1;}
/* item */
.ir{background:#f8f5ef;border-radius:7px;padding:8px;margin-bottom:6px;border:1px solid #e0d8c0;}
.ig{display:grid;grid-template-columns:84px 1fr 46px 62px 24px;gap:5px;align-items:center;}
.ig input,.ig select{font-size:13px;padding:6px 7px;}
/* autocomplete */
.acw{position:relative;}
.sug{position:absolute;top:100%;right:0;left:0;background:#fff;border:1.5px solid var(--g);border-top:none;border-radius:0 0 7px 7px;z-index:50;max-height:120px;overflow-y:auto;display:none;box-shadow:0 4px 12px rgba(0,0,0,.12);}
.sug.open{display:block;}
.si{padding:7px 10px;cursor:pointer;font-size:13px;} .si:hover{background:var(--gbg);}
/* subtotal */
.sub{border-top:2px solid var(--bdr);padding-top:9px;margin-top:6px;}
.sr{display:flex;justify-content:space-between;font-size:13px;color:#5a5040;margin-bottom:3px;max-width:240px;}
.st{display:flex;justify-content:space-between;font-weight:700;font-size:15px;color:var(--g);border-top:1px solid #c0b898;padding-top:4px;margin-top:2px;max-width:240px;}
/* tables */
.bt{width:100%;border-collapse:collapse;font-size:12px;}
.bt th{background:var(--g);color:#fff;padding:7px 9px;text-align:right;font-weight:700;}
.bt td{padding:5px 9px;border-bottom:1px solid #e0d8c0;vertical-align:top;}
.bt tr:last-child td{border-bottom:none;}
/* modal */
.ov{position:fixed;inset:0;background:rgba(10,10,5,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px;}
.modal{background:var(--cream);border-radius:14px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 24px 60px rgba(0,0,0,.3);padding:22px;}
/* toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--g);color:#fff;padding:9px 22px;border-radius:30px;font-weight:700;font-size:13px;z-index:999;display:none;}
/* misc */
.ic{background:#f0f5ee;border-radius:8px;padding:11px;margin-top:7px;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
#bbar{border-top:1px solid var(--bdr);padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;background:var(--cream);}
.stat-g{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
@media(min-width:480px){.stat-g{grid-template-columns:repeat(4,1fr);}}
.stat-c{background:var(--cream);border:1px solid var(--bdr);border-radius:10px;padding:13px 15px;}
.stat-n{font-size:21px;font-weight:800;color:var(--g);}
.stat-l{font-size:11px;color:var(--mut);margin-top:2px;font-weight:600;}
.stat-s{font-size:11px;color:var(--mut);margin-top:2px;}
.chart-w{background:var(--cream);border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:14px;}
.chart-t{font-size:13px;font-weight:700;margin-bottom:10px;}
.walkin-tag{font-size:10px;background:#e8d8f0;color:#6a3d8f;border-radius:4px;padding:1px 5px;margin-right:4px;}
@media print{#hdr,.tab,#bbar,.np{display:none!important;}}
@media(max-width:480px){
  .logo-t{font-size:13px;} #main{padding:10px;} .modal{padding:15px;}
  .ig{grid-template-columns:76px 1fr 42px 54px 20px;gap:3px;} .ig input,.ig select{font-size:12px;padding:5px 6px;}
  .two{grid-template-columns:1fr;} .sr,.st{max-width:100%;} .bt{font-size:11px;}
}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo">
    <div style="font-size:26px;">🌿</div>
    <div>
      <div class="logo-t">יומן מתן רביד גינון והשקיה</div>
      <div class="logo-s">עוזר יומי לגנן</div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div id="main"><div style="padding:40px;text-align:center;color:var(--g);">⏳ טוען...</div></div>

<div id="bbar">
  <span style="font-size:11px;font-weight:700;color:var(--mut);">שמירת נתונים:</span>
  <button class="btn bo bsm" onclick="exportD()">💾 ייצוא גיבוי</button>
  <label class="btn bo bsm" style="cursor:pointer;">📂 טעינת גיבוי
    <input type="file" accept=".json" style="display:none;width:auto;" onchange="importD(event)">
  </label>
  <span id="ss" style="font-size:11px;font-weight:700;color:var(--g);"></span>
</div>
<div id="mw"></div>
<div id="toast"></div>

<script>
// ════════════════════════════════════
// DATA & STATE
// ════════════════════════════════════
var S = {customers:[], visits:{}, plants:[], nextId:1};
var V = {tab:'calendar', yr:new Date().getFullYear(), mo:new Date().getMonth(),
         day:new Date().toISOString().slice(0,10), modal:null, addCust:false,
         custQ:'', editId:null, billData:null};

var MN = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
var DW = ["א'","ב'","ג'","ד'","ה'","ו'","ש'"];
var SIZES = ['כוסית','עציץ 12','גודל 4','10 ליטר','25 ליטר','50 ליטר','70 ליטר'];
var FERT = ['דשן למשאבת דישון','דישון לדשא','דישון לעצים','אחר'];
var CATS = ['צמחים','דשן','ריסוס','אחר'];

// holidays  h=חג  v=חופשה  m=זיכרון
var HL = {};
(function(){
  var h = [
    ['2024-10-02','ראש השנה','h'],['2024-10-03',"ב' ר\"ה",'h'],
    ['2024-10-11','ערב יוה"כ','h'],['2024-10-12','יום כיפור','h'],
    ['2024-10-16','סוכות','h'],['2024-10-17','סוכות','v'],
    ['2024-10-18','חוה"מ','v'],['2024-10-19','חוה"מ','v'],['2024-10-20','חוה"מ','v'],['2024-10-21','חוה"מ','v'],
    ['2024-10-23','שמיני עצרת','h'],['2024-10-24','שמחת תורה','h'],
    ['2024-12-25','חנוכה','h'],['2024-12-26','חנוכה','v'],['2024-12-27','חנוכה','v'],
    ['2024-12-28','חנוכה','v'],['2024-12-29','חנוכה','v'],['2024-12-30','חנוכה','v'],
    ['2024-12-31','חנוכה','v'],['2025-01-01','חנוכה','v'],['2025-01-02','חנוכה','h'],
    ['2025-02-13','ט"ו בשבט','h'],['2025-03-13','תענית אסתר','h'],['2025-03-14','פורים','h'],
    ['2025-04-12','ערב פסח','h'],['2025-04-13','פסח','h'],['2025-04-14','פסח','v'],
    ['2025-04-15','חוה"מ פסח','v'],['2025-04-16','חוה"מ פסח','v'],['2025-04-17','חוה"מ פסח','v'],
    ['2025-04-18','חוה"מ פסח','v'],['2025-04-19','חוה"מ פסח','v'],['2025-04-20','שביעי פסח','h'],
    ['2025-04-27','יום השואה','m'],['2025-04-30','יום הזיכרון','m'],['2025-05-01','יום העצמאות','h'],
    ['2025-05-26','ל"ג בעומר','h'],['2025-06-01','ערב שבועות','h'],
    ['2025-06-02','שבועות','h'],['2025-06-03','שבועות','v'],['2025-08-12','תשעה באב','h'],
    ['2025-09-22','ראש השנה','h'],['2025-09-23',"ב' ר\"ה",'h'],['2025-09-24','צום גדליה','h'],
    ['2025-10-01','ערב יוה"כ','h'],['2025-10-02','יום כיפור','h'],
    ['2025-10-06','סוכות','h'],['2025-10-07','סוכות','v'],
    ['2025-10-08','חוה"מ','v'],['2025-10-09','חוה"מ','v'],['2025-10-10','חוה"מ','v'],
    ['2025-10-11','חוה"מ','v'],['2025-10-12','חוה"מ','v'],
    ['2025-10-13','שמיני עצרת','h'],['2025-10-14','שמחת תורה','h'],
    ['2025-12-14','חנוכה','h'],['2025-12-15','חנוכה','v'],['2025-12-16','חנוכה','v'],
    ['2025-12-17','חנוכה','v'],['2025-12-18','חנוכה','v'],['2025-12-19','חנוכה','v'],
    ['2025-12-20','חנוכה','v'],['2025-12-21','חנוכה','v'],['2025-12-22','חנוכה','h'],
    ['2026-02-01','ט"ו בשבט','h'],['2026-03-02','פורים','h'],['2026-03-03','שושן פורים','h'],
    ['2026-03-29','ערב פסח','h'],['2026-03-30','פסח','h'],['2026-03-31','פסח','v'],
    ['2026-04-01','חוה"מ פסח','v'],['2026-04-02','חוה"מ פסח','v'],['2026-04-03','חוה"מ פסח','v'],
    ['2026-04-04','חוה"מ פסח','v'],['2026-04-05','חוה"מ פסח','v'],['2026-04-06','שביעי פסח','h'],
    ['2026-04-16','יום השואה','m'],['2026-04-22','יום הזיכרון','m'],['2026-04-23','יום העצמאות','h'],
    ['2026-05-14','ל"ג בעומר','h'],['2026-05-21','ערב שבועות','h'],
    ['2026-05-22','שבועות','h'],['2026-05-23','שבועות','v'],['2026-07-23','תשעה באב','h']
  ];
  h.forEach(function(x){HL[x[0]]=[x[1],x[2]];});
  // summer
  for(var d=1;d<=31;d++){
    var p='0'+d; p=p.slice(-2);
    HL['2025-07-'+p]=['חופש קיץ','v'];
    if(d!==12)HL['2025-08-'+p]=['חופש קיץ','v'];
    HL['2026-07-'+p]=['חופש קיץ','v'];
    HL['2026-08-'+p]=['חופש קיץ','v'];
  }
})();

// ════════════════════════════════════
// STORAGE
// ════════════════════════════════════
var SK = 'gardener_MASTER';
function save(){
  try{var j=JSON.stringify(S);localStorage.setItem(SK,j);localStorage.setItem(SK+'_bak',j);}
  catch(e){console.error('save error',e);}
}
function loadData(){
  var keys=[SK,SK+'_bak','gardener_v4','gardener_v4_bak','gardener_v3','gardener_v3_bak'];
  for(var i=0;i<keys.length;i++){
    try{
      var r=localStorage.getItem(keys[i]);
      if(r){var p=JSON.parse(r);if(p&&Array.isArray(p.customers)){S=p;if(!S.plants)S.plants=[];save();return;}}
    }catch(e){}
  }
}
function exportD(){
  var b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  var u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='ginnun-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
  toast('גיבוי הורד ✓');
}
function importD(ev){
  var f=ev.target.files[0];if(!f)return;
  var rd=new FileReader();
  rd.onload=function(e){
    try{var p=JSON.parse(e.target.result);if(p&&Array.isArray(p.customers)){S=p;if(!S.plants)S.plants=[];save();render();toast('נתונים שוחזרו ✓');}else toast('קובץ לא תקין');}
    catch(ex){toast('שגיאה בקריאת הקובץ');}
  };
  rd.readAsText(f);ev.target.value='';
}

// ════════════════════════════════════
// HELPERS
// ════════════════════════════════════
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dkey(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d);}
function pad(n){return n<10?'0'+n:String(n);}
function daysIn(y,m){return new Date(y,m+1,0).getDate();}
function firstDow(y,m){return new Date(y,m,1).getDay();}
function fmtDate(s){var a=s.split('-').map(Number);return DW[new Date(a[0],a[1]-1,a[2]).getDay()]+' '+a[2]+' '+MN[a[1]-1]+' '+a[0];}
function vTotal(v){
  var f1=parseFloat(v.fee)||0, f2=parseFloat(v.fee2)||0;
  var items=(v.items||[]).reduce(function(s,it){return s+(it.qty||0)*(parseFloat(it.price)||0);},0);
  return f1+f2*1.18+items;
}
function visitsInMonth(y,m){
  var mk=y+'-'+pad(m+1);
  var out=[];
  Object.keys(S.visits).forEach(function(k){if(k.indexOf(mk)===0)S.visits[k].forEach(function(v){out.push(Object.assign({},v,{date:k}));});});
  return out;
}
function allVisits(){
  var out=[];
  Object.keys(S.visits).forEach(function(k){S.visits[k].forEach(function(v){out.push(Object.assign({},v,{date:k}));});});
  return out;
}
function findVisit(ds,vid){return (S.visits[ds]||[]).find(function(v){return v.id===vid;});}
function findItem(ds,vid,iid){var v=findVisit(ds,vid);return v?(v.items||[]).find(function(i){return i.id===iid;}):null;}
function getVisitFee(custId){
  // get fee from last visit
  var vs=allVisits().filter(function(v){return v.custId===custId;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  if(vs.length)return {fee:vs[0].fee!==undefined?vs[0].fee:'',fee2:vs[0].fee2!==undefined?vs[0].fee2:''};
  var c=S.customers.find(function(c){return c.id===custId;});
  return {fee:c&&c.defaultFee!==undefined?c.defaultFee:'',fee2:''};
}
function sortedCusts(q){
  var cnt={};
  allVisits().forEach(function(v){if(v.custId)cnt[v.custId]=(cnt[v.custId]||0)+1;});
  return S.customers
    .filter(function(c){return !q||c.name.indexOf(q)>=0||c.address.indexOf(q)>=0||c.phone.indexOf(q)>=0;})
    .sort(function(a,b){return (cnt[b.id]||0)-(cnt[a.id]||0);});
}
function newItem(){return {id:Date.now()+'_'+Math.random().toString(36).slice(2),cat:'צמחים',name:'',size:'כוסית',qty:1,price:''};}

// ════════════════════════════════════
// TOAST & TABS
// ════════════════════════════════════
var _tt=null;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(_tt);_tt=setTimeout(function(){t.style.display='none';},2500);}

function buildTabs(){
  var bar=document.getElementById('tabs');
  bar.innerHTML='';
  var tabs=[['calendar','📅 לוח שנה'],['day','📋 יומן יומי'],['month','📊 חודשי'],['stats','📈 נתונים'],['customers','👤 לקוחות']];
  tabs.forEach(function(t){
    var b=document.createElement('button');
    b.className='tab'+(V.tab===t[0]?' on':'');
    b.textContent=t[1];
    b.setAttribute('data-v',t[0]);
    b.onclick=function(){go(t[0]);};
    bar.appendChild(b);
  });
}

// ════════════════════════════════════
// RENDER ENGINE
// ════════════════════════════════════
function go(tab){V.tab=tab;V.addCust=false;V.custQ='';render();}

function render(){
  save();
  var main=document.getElementById('main');
  var mw=document.getElementById('mw');
  var ss=document.getElementById('ss');
  if(!main)return;
  main.innerHTML = V.tab==='calendar'?rCal():
                   V.tab==='day'?rDay():
                   V.tab==='month'?rMonth():
                   V.tab==='stats'?rStats():
                   rCustomers();
  mw.innerHTML = V.modal?rModal():'';
  buildTabs();
  if(ss)ss.textContent='✓ נשמר | '+S.customers.length+' לקוחות | '+allVisits().length+' ביקורים';
  setupAC();
  if(V.tab==='stats')loadChartsAndDraw();
}

// ════════════════════════════════════
// CALENDAR
// ════════════════════════════════════
function rCal(){
  var ts=new Date().toISOString().slice(0,10);
  var h='';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
  h+='<button class="btn bo bsm" onclick="prevMo()">← הקודם</button>';

// Chart.js lazy load
var _cjs=false,_cjsQ=[];
function loadChartsAndDraw(){
  if(typeof Chart!=='undefined'){_drawCharts();return;}
  if(_cjs){_cjsQ.push(_drawCharts);return;}
  _cjs=true;
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
  s.onload=function(){_drawCharts();_cjsQ.forEach(function(f){f();});_cjsQ=[];};
  s.onerror=function(){console.warn('Chart.js failed');};
  document.head.appendChild(s);
}
var _charts={};
function _drawCharts(){
  if(typeof Chart==='undefined')return;
  var today=new Date();
  // 6 month bar
  var ml=[],md=[];
  for(var i=5;i>=0;i--){var d=new Date(today.getFullYear(),today.getMonth()-i,1);ml.push(MN[d.getMonth()].slice(0,3));md.push(visitsInMonth(d.getFullYear(),d.getMonth()).reduce(function(s,v){return s+vTotal(v);},0));}
  mkChart('ch-mon','bar',ml,md,'#3a6b35');
  // customers pie
  var ct={};allVisits().forEach(function(v){var k=v.walkin||(v.custId?String(v.custId):null);if(!k)return;var c=S.customers.find(function(c){return c.id===v.custId;});var n=v.walkin?v.walkin:(c?c.name:'?');ct[n]=(ct[n]||0)+vTotal(v);});
  var top=Object.entries(ct).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  if(top.length&&document.getElementById('ch-cust')){
    rmChart('ch-cust');
    _charts['ch-cust']=new Chart(document.getElementById('ch-cust'),{type:'doughnut',data:{labels:top.map(function(t){return t[0];}),datasets:[{data:top.map(function(t){return parseFloat(t[1].toFixed(2));}),backgroundColor:['#3a6b35','#7a9e72','#2980b9','#e67e22','#c0392b','#8e44ad'],borderWidth:2,borderColor:'#fff'}]},options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Heebo',size:11},boxWidth:12}}},cutout:'55%'}});
  }
  // daily line
  var dl=[],dd=[];
  for(var dd2=1;dd2<=daysIn(today.getFullYear(),today.getMonth());dd2++){var ds=dkey(today.getFullYear(),today.getMonth(),dd2);dl.push(String(dd2));dd.push((S.visits[ds]||[]).reduce(function(s,v){return s+vTotal(v);},0));}
  mkChart('ch-day','line',dl,dd,'#2980b9');
}
function rmChart(id){if(_charts[id]){_charts[id].destroy();delete _charts[id];}}
function mkChart(id,type,labels,data,color){
  rmChart(id);var el=document.getElementById(id);if(!el)return;
  _charts[id]=new Chart(el,{type:type,data:{labels:labels,datasets:[{data:data,backgroundColor:type==='bar'?color+'99':color+'33',borderColor:color,borderWidth:2,fill:type==='line',tension:.35,pointRadius:3}]},options:{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:function(v){return '₪'+v;},font:{family:'Heebo',size:10}},grid:{color:'#e8e0cc'}},x:{ticks:{font:{family:'Heebo',size:10}},grid:{display:false}}}}});
}

function addVisit(ds,custId){
  var lf=getVisitFee(custId);
  var v={id:Date.now()+'_'+Math.random().toString(36).slice(2),custId:custId,fee:lf.fee,fee2:lf.fee2,notes:'',items:[]};
  if(!S.visits[ds])S.visits[ds]=[];
  S.visits[ds].push(v);render();toast('ביקור נוסף ✓');
}
function addWalkin(ds){
  var n=(document.getElementById('wi')||{}).value||'';
  if(!n.trim()){toast('נא לכתוב שם לקוח מזדמן');return;}
  var v={id:Date.now()+'_'+Math.random().toString(36).slice(2),walkin:n.trim(),fee:'',fee2:'',notes:'',items:[]};
  if(!S.visits[ds])S.visits[ds]=[];
  S.visits[ds].push(v);render();toast('לקוח מזדמן נוסף ✓');
}
function delVisit(ds,vid){S.visits[ds]=(S.visits[ds]||[]).filter(function(v){return v.id!==vid;});render();toast('ביקור הוסר');}
function patchVisit(ds,vid,key,val){var v=findVisit(ds,vid);if(v){v[key]=val;save();}}
function setFee(ds,vid,key,val,custId){
  var v=findVisit(ds,vid);if(!v)return;
  v[key]=val===''?'':parseFloat(val);
  if(key==='fee'&&custId){var c=S.customers.find(function(c){return c.id===custId;});if(c)c.defaultFee=v[key];}
  save();render();
}
function addItem(ds,vid){var v=findVisit(ds,vid);if(!v)return;if(!v.items)v.items=[];v.items.push(newItem());render();}
function delItem(ds,vid,iid){var v=findVisit(ds,vid);if(!v)return;v.items=v.items.filter(function(i){return i.id!==iid;});render();}
function changeItemCat(ds,vid,iid,val){var it=findItem(ds,vid,iid);if(!it)return;it.cat=val;it.name='';it.size='כוסית';render();}
function patchItem(ds,vid,iid,key,val){
  var it=findItem(ds,vid,iid);if(!it)return;
  if(key==='qty')it.qty=parseInt(val)||1;
  else if(key==='price'){it.price=val;savePlant(it.name,val);}
  else it[key]=val;
  save();if(key==='price'||key==='qty')render();
}
function savePlant(name,price){
  if(!name||!name.trim())return;name=name.trim();
  var ex=S.plants.find(function(p){return p.name===name;});
  if(ex)ex.price=price;else S.plants.push({name:name,price:price});
  save();
}

function addCustModal(){
  var n=(document.getElementById('ncn')||{}).value||'';
  if(!n.trim()){toast('נא להזין שם');return;}
  S.customers.push({id:S.nextId++,name:n.trim(),address:(document.getElementById('nca')||{}).value||'',phone:(document.getElementById('ncp')||{}).value||'',defaultFee:''});
  save();closeModal();toast('לקוח נוסף ✓');
}
function addCustInline(){
  var n=(document.getElementById('ncn')||{}).value||'';
  if(!n.trim()){toast('נא להזין שם');return;}
  S.customers.push({id:S.nextId++,name:n.trim(),address:(document.getElementById('nca')||{}).value||'',phone:(document.getElementById('ncp')||{}).value||'',defaultFee:''});
  save();V.addCust=false;render();toast('לקוח נוסף ✓');
}
function saveCust(id){
  var c=S.customers.find(function(c){return c.id===id;});if(!c)return;
  var n=(document.getElementById('ecn')||{}).value||'';if(!n.trim()){toast('נא להזין שם');return;}
  c.name=n.trim();c.address=(document.getElementById('eca')||{}).value||'';c.phone=(document.getElementById('ecp')||{}).value||'';
  save();closeModal();toast('פרטים עודכנו ✓');
}
function delCust(id){if(!confirm('למחוק לקוח זה?'))return;S.customers=S.customers.filter(function(c){return c.id!==id;});save();render();toast('לקוח הוסר');}

// ════════════════════════════════════
// WHATSAPP & BILLING
// ════════════════════════════════════
function visitLine(v){
  var p=v.date.split('-').map(Number);
  var f1=parseFloat(v.fee)||0,f2=parseFloat(v.fee2)||0;
  var L=['📅 '+p[2]+'/'+p[1]+':'];
  if(v.notes)L.push('   '+v.notes);
  if(f1>0)L.push('   עלות ביקור 1: ₪'+f1.toFixed(2));
  if(f2>0)L.push('   עלות ביקור 2 + מע"מ: ₪'+(f2*1.18).toFixed(2));
  (v.items||[]).forEach(function(i){L.push('   • '+i.name+(i.size&&i.cat==='צמחים'?' ('+i.size+')':'')+' × '+i.qty+(i.price?' @ ₪'+(parseFloat(i.price)||0):''));});
  L.push('   סה"כ ביקור: ₪'+vTotal(v).toFixed(2));
  return L.join('\n');
}

function showBill(name,id,addr,phone,yr,mo){
  var allV=visitsInMonth(yr,mo);
  var vs=allV.filter(function(v){return id?v.custId===id:v.walkin===name;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  V.billData={name:name,id:id,addr:addr,phone:phone,visits:vs,total:vs.reduce(function(s,v){return s+vTotal(v);},0),month:MN[mo],year:yr};
  openModal('bill');
}
function copyBill(){navigator.clipboard.writeText(billText()).then(function(){toast('הועתק ✓');}).catch(function(){toast('שגיאה');});}
function waBill(){window.open('https://wa.me/?text='+encodeURIComponent(billText()),'_blank');}
function billText(){
  var b=V.billData;
  var L=['חשבונית שירות גינון — '+b.month+' '+b.year,'לקוח: '+b.name,(b.addr?'כתובת: '+b.addr:''),'─'.repeat(28)].filter(Boolean);
  b.visits.forEach(function(v){L.push(visitLine(v),'');});
  L.push('─'.repeat(28),'סה"כ לתשלום: ₪'+b.total.toFixed(2),'','תודה רבה! 🌿');
  return L.join('\n');
}
function sendWA(name,id,yr,mo){
  var allV=visitsInMonth(yr,mo);
  var vs=allV.filter(function(v){return id?v.custId===id:v.walkin===name;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var tot=vs.reduce(function(s,v){return s+vTotal(v);},0);
  var f1t=vs.reduce(function(s,v){return s+(parseFloat(v.fee)||0);},0);
  var f2t=vs.reduce(function(s,v){return s+(parseFloat(v.fee2)||0)*1.18;},0);
  var itT=vs.reduce(function(s,v){return s+(v.items||[]).reduce(function(ss,i){return ss+(i.qty||0)*(parseFloat(i.price)||0);},0);},0);
  var L=['שלום '+name+',','','סיכום ביקורים לחודש '+MN[mo]+' '+yr+':','─'.repeat(30),''];
  vs.forEach(function(v){L.push(visitLine(v),'');});
  L.push('─'.repeat(30),'סיכום חודש '+MN[mo]+':');
  if(f1t>0)L.push('  עלות ביקורים 1: ₪'+f1t.toFixed(2));
  if(f2t>0)L.push('  עלות ביקורים 2 + מע"מ: ₪'+f2t.toFixed(2));
  if(itT>0)L.push('  פריטים ותוספות: ₪'+itT.toFixed(2));
  L.push('','סה"כ לתשלום: ₪'+tot.toFixed(2),'','תודה רבה! 🌿');
  window.open('https://wa.me/?text='+encodeURIComponent(L.join('\n')),'_blank');
}
function allBillsText(){
  var allV=visitsInMonth(V.yr,V.mo);
  var groups=[];
  S.customers.forEach(function(c){var vs=allV.filter(function(v){return v.custId===c.id;});if(vs.length)groups.push({name:c.name,vs:vs});});
  var wi={};allV.filter(function(v){return v.walkin;}).forEach(function(v){(wi[v.walkin]=wi[v.walkin]||[]).push(v);});
  Object.keys(wi).forEach(function(n){groups.push({name:n+' (מזדמן)',vs:wi[n]});});
  var grand=allV.reduce(function(s,v){return s+vTotal(v);},0);
  var L=['סיכום חודשי — '+MN[V.mo]+' '+V.yr,'═'.repeat(30)];
  groups.forEach(function(g){
    L.push('','🏡 '+g.name);
    g.vs.sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(v){L.push(visitLine(v),'');});
    L.push('סה"כ: ₪'+g.vs.reduce(function(s,v){return s+vTotal(v);},0).toFixed(2));
  });
  L.push('','═'.repeat(30),'סה"כ כולל: ₪'+grand.toFixed(2));
  return L.join('\n');
}
function copyAllBills(){navigator.clipboard.writeText(allBillsText()).then(function(){toast('הועתק ✓');}).catch(function(){toast('שגיאה');});}
function sendAllWA(){window.open('https://wa.me/?text='+encodeURIComponent(allBillsText()),'_blank');}

// ════════════════════════════════════
// AUTOCOMPLETE (plant names)
// ════════════════════════════════════
function setupAC(){
  document.querySelectorAll('.pi').forEach(function(inp){
    inp.addEventListener('input',function(){
      var val=this.value,iid=this.dataset.iid,sg=document.getElementById('sg-'+iid);
      if(!sg)return;
      var m=S.plants.filter(function(p){return p.name.indexOf(val)>=0&&val.length>0&&p.name!==val;});
      if(!m.length){sg.classList.remove('open');return;}
      sg.innerHTML=m.map(function(p){return '<div class="si" data-n="'+x(p.name)+'" data-p="'+x(p.price||'')+'">'+x(p.name)+(p.price?' — ₪'+p.price:'')+'</div>';}).join('');
      sg.querySelectorAll('.si').forEach(function(el){
        el.addEventListener('mousedown',function(e){
          e.preventDefault();
          var it=findItem(inp.dataset.ds,inp.dataset.vid,inp.dataset.iid);
          if(it){it.name=this.dataset.n;it.price=this.dataset.p||it.price;save();render();}
        });
      });
      sg.classList.add('open');
    });
    inp.addEventListener('blur',function(){
      var self=this;
      setTimeout(function(){
        var sg=document.getElementById('sg-'+self.dataset.iid);
        if(sg)sg.classList.remove('open');
        var it=findItem(self.dataset.ds,self.dataset.vid,self.dataset.iid);
        if(it&&self.value!==it.name){it.name=self.value;savePlant(self.value,it.price);save();}
      },150);
    });
  });
}
